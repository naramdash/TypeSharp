name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to publish, for example v0.1.0-preview.5'
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: pwsh

env:
  CONFIGURATION: Release
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '24'

jobs:
  pack-tool:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        run: |
          $ErrorActionPreference = 'Stop'

          $event = Get-Content -Raw -LiteralPath $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $releaseTag = [string] $event.inputs.tag
          }
          else {
            $releaseTag = [string] $env:GITHUB_REF_NAME
          }

          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            throw 'Release tag could not be resolved from the workflow event.'
          }

          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_VERSION=$($releaseTag.TrimStart('v'))" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate release tag
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+(-preview\.\d+)?$') {
            throw "Release tag '$env:RELEASE_TAG' must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-preview.N."
          }

          git fetch --force --tags
          git rev-parse "refs/tags/$env:RELEASE_TAG" | Out-Null
          $tagCommit = git rev-list -n 1 "refs/tags/$env:RELEASE_TAG"
          git checkout --force --detach "refs/tags/$env:RELEASE_TAG"
          $headCommit = git rev-parse HEAD
          if ($tagCommit -ne $headCommit) {
            throw "Release checkout commit '$headCommit' did not match tag '$env:RELEASE_TAG' commit '$tagCommit'."
          }

      - name: Restore
        run: dotnet restore test\TypeSharp.Compiler.Tests\TypeSharp.Compiler.Tests.csproj

      - name: Build
        run: dotnet build test\TypeSharp.Compiler.Tests\TypeSharp.Compiler.Tests.csproj -c $env:CONFIGURATION --no-restore

      - name: Test release gates
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $tests = @(
            "runtime project targets net48",
            "core project targets net48",
            "net48 runtime artifacts avoid external package dependencies",
            "generated C# compiles in net48 project",
            "runnable example project commands are smoke-tested",
            "docs site contract is stable",
            "VS Code extension package shape is stable"
          )

          foreach ($test in $tests) {
            dotnet run --project test\TypeSharp.Compiler.Tests\TypeSharp.Compiler.Tests.csproj -c $env:CONFIGURATION --no-build -- --filter $test
          }

      - name: Verify docs site
        run: |
          npm ci
          npm run build
          npm run verify:rendered-install-route
        working-directory: docs

      - name: Pack TypeSharp.Tool
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $sourceRevision = git rev-parse --short=12 HEAD
          New-Item -ItemType Directory -Force artifacts\release | Out-Null
          dotnet pack cli\TypeSharp.Cli\TypeSharp.Cli.csproj `
            -c $env:CONFIGURATION `
            --no-restore `
            -p:Version=$env:PACKAGE_VERSION `
            -p:TypeSharpBuildMetadata=$env:RELEASE_TAG `
            -p:TypeSharpSourceRevision=$sourceRevision `
            -o artifacts\release

          $packagePath = Join-Path $env:GITHUB_WORKSPACE "artifacts\release\TypeSharp.Tool.$env:PACKAGE_VERSION.nupkg"
          if (-not (Test-Path -LiteralPath $packagePath)) {
            throw "TypeSharp.Tool package was not produced at '$packagePath'."
          }

          "PACKAGE_PATH=$packagePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Smoke test packed tool
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $toolPath = Join-Path $env:GITHUB_WORKSPACE 'artifacts\tool-smoke'
          $localPackageSource = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'
          New-Item -ItemType Directory -Force $toolPath | Out-Null
          $nugetConfigPath = Join-Path $toolPath 'NuGet.config'
          $escapedLocalPackageSource = [System.Security.SecurityElement]::Escape($localPackageSource)
          Set-Content -LiteralPath $nugetConfigPath -Encoding utf8 -Value @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local" value="$escapedLocalPackageSource" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="local">
                <package pattern="TypeSharp.Tool" />
              </packageSource>
            </packageSourceMapping>
          </configuration>
          "@

          dotnet tool install TypeSharp.Tool `
            --tool-path $toolPath `
            --configfile $nugetConfigPath `
            --version $env:PACKAGE_VERSION

          $typesharp = Join-Path $toolPath 'typesharp.exe'
          & $typesharp version
          $versionJson = & $typesharp version --json | ConvertFrom-Json

          if ($versionJson.artifactKind -ne 'dotnet-tool') {
            throw "Packed tool artifact kind '$($versionJson.artifactKind)' did not match dotnet-tool."
          }

          if ($versionJson.targetDefault -ne 'net48' -or $versionJson.runtimeTargetFramework -ne 'net48') {
            throw "Packed tool did not preserve generated/runtime net48 metadata."
          }

          $runtimePathJson = & $typesharp runtime-path --json | ConvertFrom-Json
          if ($runtimePathJson.targetFramework -ne 'net48') {
            throw "Packed tool runtime path target '$($runtimePathJson.targetFramework)' did not match net48."
          }

          foreach ($runtimeDll in @($runtimePathJson.core, $runtimePathJson.runtime)) {
            if (-not (Test-Path -LiteralPath $runtimeDll)) {
              throw "Packed tool runtime DLL was missing: $runtimeDll"
            }
          }

      - name: Record deferred NuGet publication
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host "TypeSharp.Tool package is ready at $env:PACKAGE_PATH."
          Write-Host "NuGet.org account setup, package ownership, API key creation, and first publish are intentionally manual for now."
          Write-Host "Follow agent/nuget-deploy.md before enabling automated NuGet.org publication."
