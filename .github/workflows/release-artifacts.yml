              Assert-Contains $explainText 'Severity: error' "Hosted CLI explain output did not include severity for $($diagnosticExplain.Code)."
              Assert-Contains $explainText "Category: $($diagnosticExplain.Category)" "Hosted CLI explain output did not include category for $($diagnosticExplain.Code)."
              Assert-Contains $explainText 'Suggested action:' "Hosted CLI explain output did not include a suggested action for $($diagnosticExplain.Code)."
            }

            foreach ($diagnosticExplain in $diagnosticExplains) {
              $explainJsonText = typesharp explain $diagnosticExplain.Code --json
              if ($LASTEXITCODE -ne 0) {
                throw "Hosted CLI explain JSON smoke failed for $($diagnosticExplain.Code)."
              }
              $explainJson = ($explainJsonText -join "`n") | ConvertFrom-Json
              if ($explainJson.diagnostic.code -ne $diagnosticExplain.Code -or $explainJson.diagnostic.title -ne $diagnosticExplain.Title -or $explainJson.diagnostic.severity -ne 'error' -or $explainJson.diagnostic.category -ne $diagnosticExplain.Category) {
                throw "Hosted CLI explain JSON payload did not match descriptor metadata for $($diagnosticExplain.Code)."
              }
              Assert-Contains $explainJson.diagnostic.explanation ' ' "Hosted CLI explain JSON payload did not include an explanation for $($diagnosticExplain.Code)."
              Assert-Contains $explainJson.diagnostic.suggestedAction ' ' "Hosted CLI explain JSON payload did not include a suggested action for $($diagnosticExplain.Code)."
            }

            typesharp new library HostedShared --target net48 --output HostedShared
            if ($LASTEXITCODE -ne 0) {
              throw 'Hosted CLI new shared project-reference library smoke failed.'
            }

            @(
              '[project]',
              'name = "HostedShared"',
              'targetFramework = "net48"',
              'outputType = "library"',
              'rootNamespace = "HostedShared"',
              'sourceRoots = ["src"]',
              'generatedOutputRoot = "generated"',
              '',
              '[language]',
              'version = "preview"',
              'strict = true',
              'nullable = "strict"',
              'previewFeatures = []',
              '',
              '[references]',
              'assemblies = ["System", "System.Core"]',
              'paths = []',
              'packages = []',
              '',
              '[tooling]',
              'diagnosticFormat = "text"',
              'treatWarningsAsErrors = false'
            ) | Set-Content -Encoding utf8 -Path (Join-Path $workspaceRoot 'HostedShared\TypeSharp.toml')

            @(
              'namespace HostedShared',
              '',
              'export fun sharedMessage(): string = "shared-hosted"'
            ) | Set-Content -Encoding utf8 -Path (Join-Path $workspaceRoot 'HostedShared\src\Library.tysh')

            typesharp new library HostedProjectReference --target net48 --output HostedProjectReference
            if ($LASTEXITCODE -ne 0) {
              throw 'Hosted CLI new project-reference dependent library smoke failed.'
            }

            @(
              '[project]',
              'name = "HostedProjectReference"',
              'targetFramework = "net48"',
              'outputType = "library"',
              'rootNamespace = "HostedProjectReference"',
              'sourceRoots = ["src"]',
              'generatedOutputRoot = "generated"',
              '',
              '[language]',
              'version = "preview"',
              'strict = true',
              'nullable = "strict"',
              'previewFeatures = []',
              '',
              '[references]',
              'assemblies = ["System", "System.Core"]',
              'paths = []',
              'packages = []',
              '',
              '[projectReferences]',
              'paths = ["../HostedShared/TypeSharp.toml"]',
              '',
              '[tooling]',
              'diagnosticFormat = "text"',
              'treatWarningsAsErrors = false'
            ) | Set-Content -Encoding utf8 -Path (Join-Path $workspaceRoot 'HostedProjectReference\TypeSharp.toml')

            @(
              'namespace HostedProjectReference',
              '',
              'import { sharedMessage } from "HostedShared/Library"',
              '',
              'export fun readShared(): string = sharedMessage()'
            ) | Set-Content -Encoding utf8 -Path (Join-Path $workspaceRoot 'HostedProjectReference\src\Library.tysh')

            typesharp check HostedProjectReference\TypeSharp.toml
            if ($LASTEXITCODE -ne 0) {
              throw 'Hosted CLI project-reference check smoke failed.'
            }

            typesharp build HostedProjectReference\TypeSharp.toml
            if ($LASTEXITCODE -ne 0) {
              throw 'Hosted CLI project-reference build smoke failed.'
            }

            $projectReferenceGeneratedProject = Get-Content -Raw -Path (Join-Path $workspaceRoot 'HostedProjectReference\generated\HostedProjectReference.Generated.csproj')
            Assert-Contains $projectReferenceGeneratedProject '<Reference Include="HostedShared">' 'Hosted project-reference smoke did not emit a reference to HostedShared.'
            Assert-Contains $projectReferenceGeneratedProject 'HostedShared/generated/bin/Debug/net48/HostedShared.dll' 'Hosted project-reference smoke did not emit the expected generated assembly hint path.'

            typesharp new library HostedRuntimeSmoke --target net48 --output HostedRuntimeSmoke
            if ($LASTEXITCODE -ne 0) {
              throw 'Hosted CLI new runtime library smoke failed.'
            }

            @(
              '[project]',
              'name = "HostedRuntimeSmoke"',
              'targetFramework = "net48"',
              'outputType = "library"',
              'rootNamespace = "HostedRuntimeSmoke"',
              'sourceRoots = ["src"]',
              'generatedOutputRoot = "generated"',
              '',
              '[language]',
              'version = "preview"',
              'strict = true',
              'nullable = "strict"',
              'previewFeatures = []',
              '',
              '[references]',
              'assemblies = [',
              '  "System",',
              '  "System.Core"',
              ']',
              'paths = [',
              '  "../typesharp-runtime/lib/net48/TypeSharp.Core.dll",',
              '  "../typesharp-runtime/lib/net48/TypeSharp.Runtime.dll"',
              ']',
              'packages = []',
              '',
              '[tooling]',
              'diagnosticFormat = "text"',
              'treatWarningsAsErrors = false'
            ) | Set-Content -Encoding utf8 -Path (Join-Path $workspaceRoot 'HostedRuntimeSmoke\TypeSharp.toml')

            @(
              'namespace HostedRuntimeSmoke',
              '',
              'import { Option, Result } from "TypeSharp.Core"',
              '',
              'public union HostedState {',
              '  Draft',
              '  Posted(id: string)',
              '}',
              '',
              'export fun keepOption(value: Option<string>): Option<string> = value',
              '',
              'export fun keepResult(value: Result<HostedState, string>): Result<HostedState, string> = value',
              '',
              'export fun posted(id: string): HostedState = Posted(id)',
              '',
              'export fun describe(state: HostedState): string =',
              '  match state {',
              '    Draft => "Draft"',
              '    Posted(id) => $"Posted:{id}"',
              '  }'
            ) | Set-Content -Encoding utf8 -Path (Join-Path $workspaceRoot 'HostedRuntimeSmoke\src\Library.tysh')

            typesharp check HostedRuntimeSmoke\TypeSharp.toml
            if ($LASTEXITCODE -ne 0) {
              throw 'Hosted CLI runtime library check smoke failed.'
            }

            typesharp build HostedRuntimeSmoke\TypeSharp.toml
            if ($LASTEXITCODE -ne 0) {
              throw 'Hosted CLI runtime library build smoke failed.'
            }

            $runtimeGeneratedProject = Get-Content -Raw -Path (Join-Path $workspaceRoot 'HostedRuntimeSmoke\generated\HostedRuntimeSmoke.Generated.csproj')
            Assert-Contains $runtimeGeneratedProject '<Reference Include="TypeSharp.Core">' 'Hosted runtime library generated project did not reference TypeSharp.Core.'
            Assert-Contains $runtimeGeneratedProject '<HintPath>../../typesharp-runtime/lib/net48/TypeSharp.Core.dll</HintPath>' 'Hosted runtime library generated project did not use the downloaded TypeSharp.Core hint path.'
            Assert-Contains $runtimeGeneratedProject '<Reference Include="TypeSharp.Runtime">' 'Hosted runtime library generated project did not reference TypeSharp.Runtime.'
            Assert-Contains $runtimeGeneratedProject '<HintPath>../../typesharp-runtime/lib/net48/TypeSharp.Runtime.dll</HintPath>' 'Hosted runtime library generated project did not use the downloaded TypeSharp.Runtime hint path.'

            $previousNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
            $PSNativeCommandUseErrorActionPreference = $false
            try {
              $libraryRunOutput = typesharp run HostedRuntimeSmoke\TypeSharp.toml 2>&1
              $libraryRunExitCode = $LASTEXITCODE
            }
            finally {
              $PSNativeCommandUseErrorActionPreference = $previousNativeCommandPreference
            }
            if ($libraryRunExitCode -ne 5) {
              throw "Hosted CLI library run rejection returned exit code $libraryRunExitCode instead of 5."
            }
            Assert-Contains ($libraryRunOutput -join "`n") 'typesharp run requires project outputType = "exe".' 'Hosted CLI library run rejection did not report the executable outputType requirement.'

            $consumerRoot = Join-Path $workspaceRoot 'HostedRuntimeConsumer'
            New-Item -ItemType Directory -Force $consumerRoot | Out-Null
            @(
              '<Project Sdk="Microsoft.NET.Sdk">',
              '  <PropertyGroup>',
              '    <TargetFramework>net48</TargetFramework>',
              '    <LangVersion>7.3</LangVersion>',
              '    <ImplicitUsings>false</ImplicitUsings>',
              '    <Nullable>disable</Nullable>',
              '    <AssemblyName>HostedRuntimeConsumer</AssemblyName>',
              '  </PropertyGroup>',
              '  <ItemGroup>',
              '    <Reference Include="HostedRuntimeSmoke">',
              '      <HintPath>..\HostedRuntimeSmoke\generated\bin\Debug\net48\HostedRuntimeSmoke.dll</HintPath>',
              '    </Reference>',
              '    <Reference Include="TypeSharp.Core">',
              '      <HintPath>..\typesharp-runtime\lib\net48\TypeSharp.Core.dll</HintPath>',
              '    </Reference>',
              '    <Reference Include="TypeSharp.Runtime">',
              '      <HintPath>..\typesharp-runtime\lib\net48\TypeSharp.Runtime.dll</HintPath>',
              '    </Reference>',
              '  </ItemGroup>',
              '</Project>'
            ) | Set-Content -Encoding utf8 -Path (Join-Path $consumerRoot 'HostedRuntimeConsumer.csproj')

            @(
              '<?xml version="1.0" encoding="utf-8"?>',
              '<configuration>',
              '  <packageSources>',
              '    <clear />',
              '  </packageSources>',
              '</configuration>'
            ) | Set-Content -Encoding utf8 -Path (Join-Path $consumerRoot 'NuGet.config')

            @(
              'using TypeSharp.Runtime;',
              '',
              'namespace HostedRuntimeConsumer',
              '{',
              '    public static class Consumer',
              '    {',
              '        public static string Read()',
              '        {',
              '            var option = TypeSharp.Core.Option<string>.Some("visible");',
              '            var result = TypeSharp.Core.Result<HostedRuntimeSmoke.HostedState, string>.Ok(HostedRuntimeSmoke.Module.posted("REL-1"));',
              '            var kept = HostedRuntimeSmoke.Module.keepResult(result);',
              '            return HostedRuntimeSmoke.Module.keepOption(option).Value',
              '                + ":"',
              '                + TypeSharpUnion.GetCaseName(kept.Value)',
              '                + ":"',
              '                + HostedRuntimeSmoke.Module.describe(kept.Value)',
              '                + ":"',
              '                + TypeSharpRuntimeInfo.RuntimeAbiVersion.ToString();',
              '        }',
              '    }',
              '}'
            ) | Set-Content -Encoding utf8 -Path (Join-Path $consumerRoot 'Consumer.cs')

            Push-Location $consumerRoot
            try {
              dotnet build HostedRuntimeConsumer.csproj --nologo --verbosity quiet --ignore-failed-sources
              if ($LASTEXITCODE -ne 0) {
                throw 'Hosted runtime C# net48 consumer build smoke failed.'
              }
            }
            finally {
              Pop-Location
            }

            $runtimeConsumerOutputRoot = Join-Path $consumerRoot 'bin\Debug\net48'
            if (-not (Test-Path (Join-Path $runtimeConsumerOutputRoot 'HostedRuntimeConsumer.dll'))) {
              throw 'Hosted runtime C# net48 consumer build did not produce the consumer assembly.'
            }
            if (-not (Test-Path (Join-Path $runtimeConsumerOutputRoot 'HostedRuntimeSmoke.dll'))) {
              throw 'Hosted runtime C# net48 consumer output did not include the generated TypeSharp assembly.'
            }
            if (-not (Test-Path (Join-Path $runtimeConsumerOutputRoot 'TypeSharp.Core.dll'))) {
              throw 'Hosted runtime C# net48 consumer output did not include TypeSharp.Core.dll.'
            }
            if (-not (Test-Path (Join-Path $runtimeConsumerOutputRoot 'TypeSharp.Runtime.dll'))) {
              throw 'Hosted runtime C# net48 consumer output did not include TypeSharp.Runtime.dll.'
            }
            $runtimeOutputCoreHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $runtimeConsumerOutputRoot 'TypeSharp.Core.dll')).Hash.ToLowerInvariant()
            $downloadedCoreHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $runtimeRoot 'lib\net48\TypeSharp.Core.dll')).Hash.ToLowerInvariant()
            if ($runtimeOutputCoreHash -ne $downloadedCoreHash) {
              throw "Hosted runtime C# net48 consumer output TypeSharp.Core.dll did not match the downloaded runtime archive. Expected $downloadedCoreHash but found $runtimeOutputCoreHash."
            }
            $runtimeOutputRuntimeHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $runtimeConsumerOutputRoot 'TypeSharp.Runtime.dll')).Hash.ToLowerInvariant()
            $downloadedRuntimeHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $runtimeRoot 'lib\net48\TypeSharp.Runtime.dll')).Hash.ToLowerInvariant()
            if ($runtimeOutputRuntimeHash -ne $downloadedRuntimeHash) {
              throw "Hosted runtime C# net48 consumer output TypeSharp.Runtime.dll did not match the downloaded runtime archive. Expected $downloadedRuntimeHash but found $runtimeOutputRuntimeHash."
            }
          }
          finally {
            Pop-Location
          }

          if (-not (Test-Path (Join-Path $workspaceRoot 'HostedReleaseSmoke\generated\bin\Debug\net48\HostedReleaseSmoke.exe'))) {
            throw 'Hosted CLI build did not produce the expected net48 executable.'
          }
          if (-not (Test-Path (Join-Path $workspaceRoot 'lib\Legacy.Tools.dll'))) {
            throw 'Hosted local-DLL smoke did not build the expected Legacy.Tools.dll.'
          }
          if (-not (Test-Path (Join-Path $workspaceRoot 'HostedLocalDllSmoke\generated\bin\Debug\net48\HostedLocalDllSmoke.dll'))) {
            throw 'Hosted CLI local-DLL smoke did not build the generated net48 assembly.'
          }
          if (-not (Test-Path (Join-Path $workspaceRoot 'HostedShared\generated\bin\Debug\net48\HostedShared.dll'))) {
            throw 'Hosted CLI project-reference smoke did not build the referenced net48 assembly.'
          }
          if (-not (Test-Path (Join-Path $workspaceRoot 'HostedProjectReference\generated\bin\Debug\net48\HostedProjectReference.dll'))) {
            throw 'Hosted CLI project-reference smoke did not build the dependent net48 assembly.'
          }
          if (-not (Test-Path (Join-Path $workspaceRoot 'HostedRuntimeSmoke\generated\bin\Debug\net48\HostedRuntimeSmoke.dll'))) {
            throw 'Hosted CLI runtime library build did not produce the expected net48 assembly.'
          }
