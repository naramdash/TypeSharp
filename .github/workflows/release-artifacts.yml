name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to publish, for example v0.1.0-preview.1'
        required: true
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: pwsh

env:
  CONFIGURATION: Release
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '24'

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        run: |
          $ErrorActionPreference = 'Stop'

          $event = Get-Content -Raw -LiteralPath $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $releaseTag = [string] $event.inputs.tag
          }
          else {
            $releaseTag = [string] $env:GITHUB_REF_NAME
          }

          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            throw 'Release tag could not be resolved from the workflow event.'
          }

          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate release tag
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+(-preview\.\d+)?$') {
            throw "Release tag '$env:RELEASE_TAG' must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-preview.N."
          }

          git fetch --force --tags
          git rev-parse "refs/tags/$env:RELEASE_TAG" | Out-Null
          $tagCommit = git rev-list -n 1 "refs/tags/$env:RELEASE_TAG"
          git checkout --force --detach "refs/tags/$env:RELEASE_TAG"
          $headCommit = git rev-parse HEAD
          if ($tagCommit -ne $headCommit) {
            throw "Release checkout commit '$headCommit' did not match tag '$env:RELEASE_TAG' commit '$tagCommit'."
          }

      - name: Prepare artifact directories
        run: |
          Remove-Item -Recurse -Force artifacts\release, artifacts\staging -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force artifacts\release, artifacts\staging | Out-Null

      - name: Restore .NET projects
        run: dotnet restore test\TypeSharp.Compiler.Tests\TypeSharp.Compiler.Tests.csproj

      - name: Build .NET projects
        run: dotnet build test\TypeSharp.Compiler.Tests\TypeSharp.Compiler.Tests.csproj -c $env:CONFIGURATION --no-restore

      - name: Run release smoke tests
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $tests = @(
            "runtime project targets net48",
            "core project targets net48",
            "net48 runtime artifacts avoid external package dependencies",
            "generated C# compiles in net48 project",
            "runnable example project commands are smoke-tested",
            "docs site contract is stable",
            "VS Code extension package shape is stable"
          )

          foreach ($test in $tests) {
            dotnet run --project test\TypeSharp.Compiler.Tests\TypeSharp.Compiler.Tests.csproj -c $env:CONFIGURATION --no-build $test
          }

      - name: Verify docs site before release
        run: |
          npm ci
          npm run build
          npm run verify:rendered-install-route
        working-directory: docs

      - name: Verify GitHub Pages configuration
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $pages = gh api "repos/$env:GITHUB_REPOSITORY/pages" | ConvertFrom-Json
          if ([string] $pages.build_type -ne 'workflow') {
            throw "GitHub Pages build type was '$($pages.build_type)' instead of workflow."
          }

          if ([string] $pages.html_url -ne 'https://naramdash.github.io/TypeSharp/') {
            throw "GitHub Pages URL was '$($pages.html_url)' instead of https://naramdash.github.io/TypeSharp/."
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch public docs for release
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $headCommit = git rev-parse HEAD
          git fetch --force origin main:refs/remotes/origin/main
          $mainCommit = git rev-parse refs/remotes/origin/main
          if ($mainCommit -ne $headCommit) {
            throw "Release tag '$env:RELEASE_TAG' commit '$headCommit' must match origin/main '$mainCommit' before dispatching public docs from main."
          }

          $dispatchStartedAt = [DateTimeOffset]::UtcNow.AddSeconds(-10)
          $dispatchOutput = gh workflow run docs.yml --ref main -f release_tag=$env:RELEASE_TAG 2>&1
          $dispatchText = ($dispatchOutput -join "`n")
          $docsWorkflowRunId = $null
          if ($dispatchText -match '/actions/runs/(\d+)') {
            $docsWorkflowRunId = $Matches[1]
          }

          if ([string]::IsNullOrWhiteSpace($docsWorkflowRunId)) {
            for ($attempt = 1; $attempt -le 12; $attempt++) {
              $runs = gh run list --workflow docs.yml --commit $headCommit --event workflow_dispatch --json databaseId,headSha,headBranch,status,conclusion,url,createdAt --limit 10 | ConvertFrom-Json
              $matchingRun = @($runs | Where-Object {
                $_.headSha -eq $headCommit -and [string] $_.headBranch -eq 'main' -and [DateTimeOffset]::Parse([string] $_.createdAt) -ge $dispatchStartedAt
              } | Select-Object -First 1)
              if ($matchingRun.Count -gt 0) {
                $docsWorkflowRunId = [string] $matchingRun[0].databaseId
                break
              }

              if ($attempt -lt 12) {
                Start-Sleep -Seconds 5
              }
            }
          }

          if ([string]::IsNullOrWhiteSpace($docsWorkflowRunId)) {
            throw "Could not find the dispatched docs.yml workflow run for release tag '$env:RELEASE_TAG'. Dispatch output: $dispatchText"
          }

          gh run watch $docsWorkflowRunId --exit-status --interval 10
          $docsWorkflowRun = gh run view $docsWorkflowRunId --json databaseId,headSha,headBranch,status,conclusion,url,workflowName,event,createdAt | ConvertFrom-Json
          $docsWorkflowRunCreatedAt = [DateTimeOffset]::Parse([string] $docsWorkflowRun.createdAt)
          if ($docsWorkflowRunCreatedAt -lt $dispatchStartedAt) {
            throw "Dispatched docs.yml run '$docsWorkflowRunId' was created at '$docsWorkflowRunCreatedAt' before dispatch started at '$dispatchStartedAt'."
          }
          if ([string] $docsWorkflowRun.headSha -ne $headCommit) {
            throw "Dispatched docs.yml run '$docsWorkflowRunId' used head SHA '$($docsWorkflowRun.headSha)' instead of release tag commit '$headCommit'."
          }
          if ([string] $docsWorkflowRun.headBranch -ne 'main') {
            throw "Dispatched docs.yml run '$docsWorkflowRunId' used ref '$($docsWorkflowRun.headBranch)' instead of main for Pages deployment."
          }
          if ([string] $docsWorkflowRun.status -ne 'completed') {
            throw "Dispatched docs.yml run '$docsWorkflowRunId' status was '$($docsWorkflowRun.status)' instead of completed."
          }
          if ([string] $docsWorkflowRun.conclusion -ne 'success') {
            throw "Dispatched docs.yml run '$docsWorkflowRunId' conclusion was '$($docsWorkflowRun.conclusion)' instead of success."
          }
          if ([string] $docsWorkflowRun.workflowName -ne 'Docs') {
            throw "Dispatched docs.yml run '$docsWorkflowRunId' workflow name was '$($docsWorkflowRun.workflowName)' instead of Docs."
          }
          if ([string] $docsWorkflowRun.event -ne 'workflow_dispatch') {
            throw "Dispatched docs.yml run '$docsWorkflowRunId' event was '$($docsWorkflowRun.event)' instead of workflow_dispatch."
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify public docs route before release
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $docsBaseUri = 'https://naramdash.github.io/TypeSharp'

          function Get-PublicDocsPage([string] $relativePath) {
            $uri = "$docsBaseUri$relativePath"
            $lastError = $null
            for ($attempt = 1; $attempt -le 60; $attempt++) {
              $cacheBust = [System.Uri]::EscapeDataString("$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT-$attempt")
              $requestUri = "$($uri)?typesharp-cache-bust=$cacheBust"
              try {
                $response = Invoke-WebRequest -Uri $requestUri -UseBasicParsing -TimeoutSec 30 -Headers @{
                  'Cache-Control' = 'no-cache'
                  'Pragma' = 'no-cache'
                }
                if ($response.StatusCode -eq 200 -and -not [string]::IsNullOrWhiteSpace([string] $response.Content)) {
                  return [string] $response.Content
                }

                $lastError = "Public docs request '$requestUri' returned status '$($response.StatusCode)' or empty content."
              }
              catch {
                $lastError = $_.Exception.Message
              }

              if ($attempt -lt 60) {
                Start-Sleep -Seconds 20
              }
            }

            throw "Public docs route '$uri' was not available before release after 60 attempts. Last error: $lastError"
          }

          function Assert-PublicDocsContains([string] $content, [string] $expected, [string] $message) {
            if (-not $content.Contains($expected)) {
              throw $message
            }
          }

          function Assert-PublicDocsContainsAny([string] $content, [string[]] $expectedValues, [string] $message) {
            foreach ($expected in $expectedValues) {
              if ($content.Contains($expected)) {
                return
              }
            }

            throw $message
          }

          function Assert-PublicDocsNotContains([string] $content, [string] $unexpected, [string] $message) {
            if ($content.Contains($unexpected)) {
              throw $message
            }
          }

          function Assert-PublicDocsBefore([string] $content, [string] $earlier, [string] $later, [string] $message) {
            $earlierIndex = $content.IndexOf($earlier, [System.StringComparison]::Ordinal)
            $laterIndex = $content.IndexOf($later, [System.StringComparison]::Ordinal)
            if ($earlierIndex -lt 0 -or $laterIndex -lt 0 -or $earlierIndex -ge $laterIndex) {
              throw $message
            }
          }

          function Assert-PublicDocsRuntimeRoute([string] $content, [string] $label) {
            Assert-PublicDocsReleaseNotesRoute $content $label
            Assert-PublicDocsContains $content 'typesharp-runtime-net48-' "Public docs $label route does not expose the runtime release asset before release."
            Assert-PublicDocsContains $content 'SHA256SUMS.txt' "Public docs $label route does not expose the checksum manifest before release."
          }

          function Assert-PublicDocsReleaseNotesRoute([string] $content, [string] $label) {
            Assert-PublicDocsContains $content 'GitHub Release notes' "Public docs $label route does not point to GitHub Release notes before release."
            Assert-PublicDocsContains $content 'exact asset names' "Public docs $label route does not tell users to confirm exact asset names before release."
          }

          function Assert-PublicDocsCanonicalRoute([string] $content, [string] $relativePath, [string] $label, [bool] $allowStaleHostText = $false) {
            $canonicalUrl = "https://naramdash.github.io/TypeSharp$relativePath"
            Assert-PublicDocsContains $content "rel=`"canonical`" href=`"$canonicalUrl`"" "Public docs $label route does not use the public GitHub Pages canonical URL before release."
            Assert-PublicDocsContains $content "property=`"og:url`" content=`"$canonicalUrl`"" "Public docs $label route does not use the public GitHub Pages Open Graph URL before release."
            if (-not $allowStaleHostText) {
              Assert-PublicDocsNotContains $content 'https://typesharp.github.io/TypeSharp' "Public docs $label route still uses the stale legacy GitHub Pages URL before release."
            }
          }

          $publicDocsHome = Get-PublicDocsPage '/'
          $publicDocsInstall = Get-PublicDocsPage '/install/'
          $publicDocsStartHere = Get-PublicDocsPage '/start-here/'
          $publicDocsTutorials = Get-PublicDocsPage '/tutorials/'
          $publicDocsLearningPaths = Get-PublicDocsPage '/learning-paths/'
          $publicDocsLanguageTour = Get-PublicDocsPage '/language-tour/'
          $publicDocsFundamentals = Get-PublicDocsPage '/fundamentals/'
          $publicDocsGuides = Get-PublicDocsPage '/guides/'
          $publicDocsDotnetInterop = Get-PublicDocsPage '/dotnet-interop/'
          $publicDocsCookbook = Get-PublicDocsPage '/cookbook/'
          $publicDocsApi = Get-PublicDocsPage '/api/'
          $publicDocsExamples = Get-PublicDocsPage '/examples/'
          $publicDocsDiagnostics = Get-PublicDocsPage '/diagnostics/'
          $publicDocsAdvanced = Get-PublicDocsPage '/advanced/'
          $publicDocsModules = Get-PublicDocsPage '/modules/'
          $publicDocsTypeSystem = Get-PublicDocsPage '/type-system/'
          $publicDocsCsharpTypeModel = Get-PublicDocsPage '/csharp-type-model/'
          $publicDocsCsharpMembersOverloads = Get-PublicDocsPage '/csharp-members-overloads/'
          $publicDocsFeatureStatus = Get-PublicDocsPage '/feature-status/'
          $publicDocsGrammar = Get-PublicDocsPage '/grammar/'
          $publicDocsReference = Get-PublicDocsPage '/reference/'
          $publicDocsLowering = Get-PublicDocsPage '/lowering/'
          $publicDocsCli = Get-PublicDocsPage '/cli/'
          $publicDocsProjectConfiguration = Get-PublicDocsPage '/project-configuration/'
          $publicDocsRuntimeArtifacts = Get-PublicDocsPage '/runtime-artifacts/'
          $publicDocsVscodeLsp = Get-PublicDocsPage '/vscode-lsp/'
          $publicDocsMigration = Get-PublicDocsPage '/migration/'
          $publicDocsTroubleshooting = Get-PublicDocsPage '/troubleshooting/'
          $publicDocsGoal = Get-PublicDocsPage '/goal/'
          $publicDocsRequirements = Get-PublicDocsPage '/requirements/'
          $publicDocsProjectPolicy = Get-PublicDocsPage '/project-policy/'
          $publicDocsProjectLedger = Get-PublicDocsPage '/project-ledger/'
          $publicDocsWritingGuide = Get-PublicDocsPage '/writing-guide/'
          $publicDocsDocumentOwnership = Get-PublicDocsPage '/document-ownership/'
          $publicDocsSitemapIndex = Get-PublicDocsPage '/sitemap-index.xml'
          $publicDocsSitemap = Get-PublicDocsPage '/sitemap-0.xml'

          $publicDocsCanonicalRoutes = @(
            @{ Label = 'home'; Content = $publicDocsHome; Path = '/' },
            @{ Label = 'Install'; Content = $publicDocsInstall; Path = '/install/' },
            @{ Label = 'Start Here'; Content = $publicDocsStartHere; Path = '/start-here/' },
            @{ Label = 'Tutorials'; Content = $publicDocsTutorials; Path = '/tutorials/' },
            @{ Label = 'Learning Paths'; Content = $publicDocsLearningPaths; Path = '/learning-paths/' },
            @{ Label = 'Language Tour'; Content = $publicDocsLanguageTour; Path = '/language-tour/' },
            @{ Label = 'Fundamentals'; Content = $publicDocsFundamentals; Path = '/fundamentals/' },
            @{ Label = 'Guides'; Content = $publicDocsGuides; Path = '/guides/' },
            @{ Label = '.NET Interop'; Content = $publicDocsDotnetInterop; Path = '/dotnet-interop/' },
            @{ Label = 'Cookbook'; Content = $publicDocsCookbook; Path = '/cookbook/' },
            @{ Label = 'API And CLI Reference'; Content = $publicDocsApi; Path = '/api/' },
            @{ Label = 'Examples'; Content = $publicDocsExamples; Path = '/examples/' },
            @{ Label = 'Diagnostics'; Content = $publicDocsDiagnostics; Path = '/diagnostics/' },
            @{ Label = 'Advanced Topics'; Content = $publicDocsAdvanced; Path = '/advanced/' },
            @{ Label = 'Modules And Imports'; Content = $publicDocsModules; Path = '/modules/' },
            @{ Label = 'Type System'; Content = $publicDocsTypeSystem; Path = '/type-system/' },
            @{ Label = 'C# And CLR Type Model'; Content = $publicDocsCsharpTypeModel; Path = '/csharp-type-model/' },
            @{ Label = 'C# Members And Overloads'; Content = $publicDocsCsharpMembersOverloads; Path = '/csharp-members-overloads/' },
            @{ Label = 'Feature Status'; Content = $publicDocsFeatureStatus; Path = '/feature-status/' },
            @{ Label = 'Grammar'; Content = $publicDocsGrammar; Path = '/grammar/' },
            @{ Label = 'Language Reference'; Content = $publicDocsReference; Path = '/reference/' },
            @{ Label = 'Lowering'; Content = $publicDocsLowering; Path = '/lowering/' },
            @{ Label = 'CLI'; Content = $publicDocsCli; Path = '/cli/' },
            @{ Label = 'Project Configuration'; Content = $publicDocsProjectConfiguration; Path = '/project-configuration/' },
            @{ Label = 'Runtime Artifacts'; Content = $publicDocsRuntimeArtifacts; Path = '/runtime-artifacts/' },
            @{ Label = 'VS Code And LSP'; Content = $publicDocsVscodeLsp; Path = '/vscode-lsp/' },
            @{ Label = 'Migration'; Content = $publicDocsMigration; Path = '/migration/' },
            @{ Label = 'Troubleshooting'; Content = $publicDocsTroubleshooting; Path = '/troubleshooting/' },
            @{ Label = 'Core Goal'; Content = $publicDocsGoal; Path = '/goal/' },
            @{ Label = 'Project Requirements'; Content = $publicDocsRequirements; Path = '/requirements/' },
            @{ Label = 'Project Policy'; Content = $publicDocsProjectPolicy; Path = '/project-policy/'; AllowStaleHostText = $true },
            @{ Label = 'Project Ledger'; Content = $publicDocsProjectLedger; Path = '/project-ledger/' },
            @{ Label = 'Writing Guide'; Content = $publicDocsWritingGuide; Path = '/writing-guide/' },
            @{ Label = 'Document Ownership'; Content = $publicDocsDocumentOwnership; Path = '/document-ownership/' }
          )

          if ($publicDocsCanonicalRoutes.Count -ne 34) {
            throw "Public docs canonical route table must contain 34 sidebar public-docs routes, found $($publicDocsCanonicalRoutes.Count)."
          }

          $publicDocsUniqueCanonicalRoutePathCount = @($publicDocsCanonicalRoutes | ForEach-Object { $_.Path } | Select-Object -Unique).Count
          if ($publicDocsUniqueCanonicalRoutePathCount -ne $publicDocsCanonicalRoutes.Count) {
            throw 'Public docs canonical route table contains duplicate public-docs paths.'
          }

          function Select-PublicDocsRoutesByLabel([object[]] $routes, [string[]] $labels, [string] $groupName) {
            $uniqueLabels = @($labels | Select-Object -Unique)
            if ($uniqueLabels.Count -ne $labels.Count) {
              throw "Public docs $groupName contains duplicate route labels."
            }

            $selectedRoutes = @()
            foreach ($label in $labels) {
              $matchingRoutes = @($routes | Where-Object { [string] $_.Label -eq $label })
              if ($matchingRoutes.Count -ne 1) {
                throw "Public docs $groupName must select exactly one canonical route for '$label', found $($matchingRoutes.Count)."
              }

              $selectedRoutes += $matchingRoutes[0]
            }

            $uniqueSelectedPathCount = @($selectedRoutes | ForEach-Object { $_.Path } | Select-Object -Unique).Count
            if ($uniqueSelectedPathCount -ne $selectedRoutes.Count) {
              throw "Public docs $groupName contains duplicate selected route paths."
            }

            return $selectedRoutes
          }

          $publicDocsBroaderReleaseRoutes = @(Select-PublicDocsRoutesByLabel $publicDocsCanonicalRoutes @(
            'Learning Paths',
            'Language Tour',
            'Fundamentals',
            'Guides',
            'Cookbook',
            'API And CLI Reference',
            'Examples',
            'Diagnostics',
            'Advanced Topics'
          ) 'broader release routes')

          $publicDocsSupportReleaseRoutes = @(Select-PublicDocsRoutesByLabel $publicDocsCanonicalRoutes @(
            'CLI',
            'Project Configuration',
            'Runtime Artifacts',
            'VS Code And LSP',
            'Migration',
            'Troubleshooting'
          ) 'support release routes')

          $publicDocsCommandPolicyRoutes = @($publicDocsSupportReleaseRoutes + $publicDocsBroaderReleaseRoutes)
          if ($publicDocsBroaderReleaseRoutes.Count -ne 9) {
            throw "Public docs broader release route subset must contain 9 routes, found $($publicDocsBroaderReleaseRoutes.Count)."
          }

          if ($publicDocsSupportReleaseRoutes.Count -ne 6) {
            throw "Public docs support release route subset must contain 6 routes, found $($publicDocsSupportReleaseRoutes.Count)."
          }

          $publicDocsUniqueCommandPolicyRoutePathCount = @($publicDocsCommandPolicyRoutes | ForEach-Object { $_.Path } | Select-Object -Unique).Count
          if ($publicDocsUniqueCommandPolicyRoutePathCount -ne $publicDocsCommandPolicyRoutes.Count) {
            throw 'Public docs command policy route subset contains duplicate public-docs paths.'
          }

          foreach ($publicDocsCanonicalRoute in $publicDocsCanonicalRoutes) {
            $allowStaleHostText = $publicDocsCanonicalRoute.ContainsKey('AllowStaleHostText') -and [bool] $publicDocsCanonicalRoute.AllowStaleHostText
            Assert-PublicDocsCanonicalRoute $publicDocsCanonicalRoute.Content $publicDocsCanonicalRoute.Path $publicDocsCanonicalRoute.Label $allowStaleHostText
          }

          Assert-PublicDocsContains $publicDocsSitemapIndex 'https://naramdash.github.io/TypeSharp/sitemap-0.xml' 'Public docs sitemap index does not use the public GitHub Pages /TypeSharp URL before release.'
          foreach ($publicDocsCanonicalRoute in $publicDocsCanonicalRoutes) {
            $sitemapUrl = "https://naramdash.github.io/TypeSharp$($publicDocsCanonicalRoute.Path)"
            Assert-PublicDocsContains $publicDocsSitemap $sitemapUrl "Public docs sitemap does not include the public GitHub Pages URL for $($publicDocsCanonicalRoute.Label) before release."
          }

          Assert-PublicDocsNotContains $publicDocsSitemapIndex 'https://typesharp.github.io/TypeSharp' 'Public docs sitemap index still uses the stale legacy GitHub Pages URL before release.'
          Assert-PublicDocsNotContains $publicDocsSitemap 'https://typesharp.github.io/TypeSharp' 'Public docs sitemap still uses the stale legacy GitHub Pages URL before release.'

          foreach ($publicDocsLegacy404Route in $publicDocsCanonicalRoutes) {
            foreach ($publicDocsLegacy404Marker in @(
              'Document not found (404)',
              'This page could not be found',
              'Page not found'
            )) {
              Assert-PublicDocsNotContains $publicDocsLegacy404Route.Content $publicDocsLegacy404Marker "Public docs $($publicDocsLegacy404Route.Label) route resolved to legacy 404 marker '$publicDocsLegacy404Marker' before release."
            }
          }

          Assert-PublicDocsContainsAny $publicDocsHome @('href="/TypeSharp/install/"', 'href="/install/"', 'href="install/"') 'Public docs home route does not link to Install before release.'
          Assert-PublicDocsReleaseNotesRoute $publicDocsHome 'home'
          Assert-PublicDocsContains $publicDocsHome 'typesharp-cli-dotnet-' 'Public docs home route does not expose the CLI release asset before release.'
          Assert-PublicDocsContains $publicDocsHome 'typesharp-runtime-net48-' 'Public docs home route does not expose the runtime release asset before release.'
          Assert-PublicDocsContains $publicDocsHome 'typesharp-vscode-' 'Public docs home route does not expose the VSIX release asset before release.'
          Assert-PublicDocsContains $publicDocsHome 'SHA256SUMS.txt' 'Public docs home route does not expose the checksum manifest before release.'
          Assert-PublicDocsNotContains $publicDocsHome 'dotnet tool install' 'Public docs home route must not expose hidden global .NET tool install guidance before release.'
          Assert-PublicDocsContains $publicDocsInstall 'Download The CLI' 'Public docs Install route does not render the release install page before release.'
          Assert-PublicDocsContains $publicDocsInstall 'naramdash/TypeSharp' 'Public docs Install route does not name the official GitHub repository before release.'
          Assert-PublicDocsContains $publicDocsInstall 'https://github.com/$repo/releases/download/$version' 'Public docs Install route does not show the GitHub Release download URL shape before release.'
          Assert-PublicDocsContains $publicDocsInstall 'https://github.com/$repo/releases/tag/$version' 'Public docs Install route does not show the GitHub Release tag URL shape before release.'
          Assert-PublicDocsReleaseNotesRoute $publicDocsInstall 'Install'
          Assert-PublicDocsContains $publicDocsInstall 'typesharp-cli-dotnet-' 'Public docs Install route does not expose the CLI release asset before release.'
          Assert-PublicDocsContains $publicDocsInstall 'typesharp-runtime-net48-' 'Public docs Install route does not expose the runtime release asset before release.'
          Assert-PublicDocsContains $publicDocsInstall 'SHA256SUMS.txt' 'Public docs Install route does not expose the checksum manifest before release.'
          Assert-PublicDocsContains $publicDocsInstall "&#x22;$env:RELEASE_TAG&#x22;" 'Public docs Install route does not set the release download version to the current tag before release.'
          Assert-PublicDocsContains $publicDocsInstall "Build metadata $env:RELEASE_TAG" 'Public docs Install route does not show the current release tag as build metadata before release.'
          Assert-PublicDocsNotContains $publicDocsInstall 'dotnet cli\TypeSharp.Cli' 'Public docs Install route must not expose repo-local CLI commands before release.'
          Assert-PublicDocsNotContains $publicDocsInstall 'dotnet tool install' 'Public docs Install route must not expose hidden global .NET tool install guidance before release.'
          Assert-PublicDocsContains $publicDocsStartHere 'Install First' 'Public docs Start Here route does not render the Install First section before release.'
          Assert-PublicDocsReleaseNotesRoute $publicDocsStartHere 'Start Here'
          Assert-PublicDocsContains $publicDocsStartHere 'typesharp-cli-dotnet-' 'Public docs Start Here route does not expose the CLI release asset before release.'
          Assert-PublicDocsContains $publicDocsStartHere 'typesharp-runtime-net48-' 'Public docs Start Here route does not expose the runtime release asset before release.'
          Assert-PublicDocsContains $publicDocsStartHere 'SHA256SUMS.txt' 'Public docs Start Here route does not expose the checksum manifest before release.'
          Assert-PublicDocsNotContains $publicDocsStartHere 'dotnet tool install' 'Public docs Start Here route must not expose hidden global .NET tool install guidance before release.'
          if ($publicDocsStartHere.Contains('dotnet cli\TypeSharp.Cli')) {
            Assert-PublicDocsBefore $publicDocsStartHere 'Install First' 'dotnet cli\TypeSharp.Cli' 'Public docs Start Here route must keep Install First before repo-local CLI fallback commands before release.'
          }
          Assert-PublicDocsReleaseNotesRoute $publicDocsTutorials 'Tutorials'
          Assert-PublicDocsContains $publicDocsTutorials 'typesharp-cli-dotnet-' 'Public docs Tutorials route does not expose the CLI release asset before release.'
          Assert-PublicDocsContains $publicDocsTutorials 'typesharp-runtime-net48-' 'Public docs Tutorials route does not expose the runtime release asset before release.'
          Assert-PublicDocsContains $publicDocsTutorials 'SHA256SUMS.txt' 'Public docs Tutorials route does not expose the checksum manifest before release.'
          Assert-PublicDocsContains $publicDocsTutorials 'typesharp new console' 'Public docs Tutorials route does not expose the installed CLI first-project command before release.'
          Assert-PublicDocsBefore $publicDocsTutorials 'typesharp-cli-dotnet-' 'typesharp new console' 'Public docs Tutorials route must keep the release install route before first project commands before release.'
          Assert-PublicDocsNotContains $publicDocsTutorials 'dotnet cli\TypeSharp.Cli' 'Public docs Tutorials route must not expose repo-local CLI commands before release.'
          Assert-PublicDocsNotContains $publicDocsTutorials 'dotnet tool install' 'Public docs Tutorials route must not expose hidden global .NET tool install guidance before release.'
          foreach ($publicDocsRoute in $publicDocsBroaderReleaseRoutes) {
            Assert-PublicDocsContainsAny $publicDocsRoute.Content @('href="/TypeSharp/install/"', 'href="/install/"', 'href="../install/"') "Public docs $($publicDocsRoute.Label) route does not link to Install before release."
            Assert-PublicDocsRuntimeRoute $publicDocsRoute.Content $publicDocsRoute.Label
            Assert-PublicDocsContains $publicDocsRoute.Content 'typesharp-cli-dotnet-' "Public docs $($publicDocsRoute.Label) route does not expose the CLI release asset before release."
          }
          Assert-PublicDocsRuntimeRoute $publicDocsCli 'CLI'
          Assert-PublicDocsContainsAny $publicDocsCli @('href="/TypeSharp/install/"', 'href="/install/"', 'href="../install/"') 'Public docs CLI route does not link to Install before release.'
          Assert-PublicDocsContains $publicDocsCli 'typesharp-cli-dotnet-' 'Public docs CLI route does not expose the CLI release asset before release.'
          Assert-PublicDocsRuntimeRoute $publicDocsProjectConfiguration 'Project Configuration'
          Assert-PublicDocsContainsAny $publicDocsProjectConfiguration @('href="/TypeSharp/install/"', 'href="/install/"', 'href="../install/"') 'Public docs Project Configuration route does not link to Install before release.'
          Assert-PublicDocsContains $publicDocsProjectConfiguration '../typesharp-runtime/lib/net48/TypeSharp.Core.dll' 'Public docs Project Configuration route does not show the extracted runtime Core DLL path before release.'
          Assert-PublicDocsContains $publicDocsProjectConfiguration '../typesharp-runtime/lib/net48/TypeSharp.Runtime.dll' 'Public docs Project Configuration route does not show the extracted runtime helper DLL path before release.'
          Assert-PublicDocsRuntimeRoute $publicDocsRuntimeArtifacts 'Runtime Artifacts'
          Assert-PublicDocsContainsAny $publicDocsRuntimeArtifacts @('href="/TypeSharp/install/"', 'href="/install/"', 'href="../install/"') 'Public docs Runtime Artifacts route does not link to Install before release.'
          Assert-PublicDocsContains $publicDocsRuntimeArtifacts 'typesharp-cli-dotnet-' 'Public docs Runtime Artifacts route does not expose the CLI release asset before release.'
          Assert-PublicDocsContains $publicDocsRuntimeArtifacts 'generated/bin/' 'Public docs Runtime Artifacts route does not show generated net48 output paths before release.'
          Assert-PublicDocsContains $publicDocsRuntimeArtifacts '../typesharp-runtime/lib/net48/TypeSharp.Core.dll' 'Public docs Runtime Artifacts route does not show the extracted runtime Core DLL path before release.'
          Assert-PublicDocsContains $publicDocsRuntimeArtifacts '../typesharp-runtime/lib/net48/TypeSharp.Runtime.dll' 'Public docs Runtime Artifacts route does not show the extracted runtime helper DLL path before release.'
          Assert-PublicDocsReleaseNotesRoute $publicDocsVscodeLsp 'VS Code And LSP'
          Assert-PublicDocsContainsAny $publicDocsVscodeLsp @('href="/TypeSharp/install/"', 'href="/install/"', 'href="../install/"') 'Public docs VS Code And LSP route does not link to Install before release.'
          Assert-PublicDocsContains $publicDocsVscodeLsp 'typesharp-vscode-' 'Public docs VS Code And LSP route does not expose the VSIX release asset before release.'
          Assert-PublicDocsContains $publicDocsVscodeLsp 'SHA256SUMS.txt' 'Public docs VS Code And LSP route does not expose the checksum manifest before release.'
          Assert-PublicDocsRuntimeRoute $publicDocsMigration 'Migration'
          Assert-PublicDocsContainsAny $publicDocsMigration @('href="/TypeSharp/install/"', 'href="/install/"', 'href="../install/"') 'Public docs Migration route does not link to Install before release.'
          Assert-PublicDocsRuntimeRoute $publicDocsTroubleshooting 'Troubleshooting'
          Assert-PublicDocsContainsAny $publicDocsTroubleshooting @('href="/TypeSharp/install/"', 'href="/install/"', 'href="../install/"') 'Public docs Troubleshooting route does not link to Install before release.'
          Assert-PublicDocsContains $publicDocsTroubleshooting 'generated/bin/' 'Public docs Troubleshooting route does not show generated net48 output paths before release.'
          Assert-PublicDocsContains $publicDocsTroubleshooting '../typesharp-runtime/lib/net48/TypeSharp.Core.dll' 'Public docs Troubleshooting route does not show the extracted runtime Core DLL path before release.'
          Assert-PublicDocsContains $publicDocsTroubleshooting '../typesharp-runtime/lib/net48/TypeSharp.Runtime.dll' 'Public docs Troubleshooting route does not show the extracted runtime helper DLL path before release.'
          foreach ($publicDocsRoute in $publicDocsCommandPolicyRoutes) {
            Assert-PublicDocsNotContains $publicDocsRoute.Content 'dotnet cli\TypeSharp.Cli' "Public docs $($publicDocsRoute.Label) route must not expose repo-local CLI commands before release."
            Assert-PublicDocsNotContains $publicDocsRoute.Content 'dotnet tool install' "Public docs $($publicDocsRoute.Label) route must not expose hidden global .NET tool install guidance before release."
          }

      - name: Publish CLI host
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $sourceRevision = git rev-parse --short=12 HEAD
          dotnet publish cli\TypeSharp.Cli\TypeSharp.Cli.csproj `
            -c $env:CONFIGURATION `
            --no-restore `
            -p:UseAppHost=false `
            -p:TypeSharpBuildMetadata=$env:RELEASE_TAG `
            -p:TypeSharpSourceRevision=$sourceRevision `
            -o artifacts\staging\typesharp-cli-dotnet

      - name: Build net48 runtime libraries
        run: |
          dotnet build lang\TypeSharp.Core\TypeSharp.Core.csproj -c $env:CONFIGURATION
          dotnet build lang\TypeSharp.Runtime\TypeSharp.Runtime.csproj -c $env:CONFIGURATION

      - name: Package VS Code extension
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          Push-Location vscode\typesharp
          npm run check
          npm run check:smoke
          npm run prepare:server
          npm run package:vsix
          Pop-Location

      - name: Assemble release assets
        run: |
          $releaseRoot = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'
          $stagingRoot = Join-Path $env:GITHUB_WORKSPACE 'artifacts\staging'
          $tag = $env:RELEASE_TAG
          $sourceRevision = git rev-parse --short=12 HEAD

          $cliRoot = Join-Path $stagingRoot 'typesharp-cli-dotnet'
          @(
            '@echo off',
            'setlocal',
            'set "TYPESHARP_HOME=%~dp0"',
            'dotnet "%TYPESHARP_HOME%typesharp.dll" %*'
          ) | Set-Content -Encoding ascii -Path (Join-Path $cliRoot 'typesharp.cmd')
          @(
            "# TypeSharp CLI $tag",
            '',
            'This archive contains the framework-dependent modern .NET TypeSharp CLI host.',
            '',
            "Build metadata: $tag",
            "Source revision: $sourceRevision",
            '',
            'Run `typesharp.cmd version` from this directory, or add the extracted directory to `PATH` and run `typesharp version`.'
          ) | Set-Content -Encoding utf8 -Path (Join-Path $cliRoot 'README.md')
          $cliZip = Join-Path $releaseRoot "typesharp-cli-dotnet-$tag.zip"
          Compress-Archive -Path (Join-Path $cliRoot '*') -DestinationPath $cliZip -Force

          $runtimeRoot = Join-Path $stagingRoot 'typesharp-runtime-net48'
          $runtimeLibRoot = Join-Path $runtimeRoot 'lib\net48'
          New-Item -ItemType Directory -Force $runtimeLibRoot | Out-Null
          Copy-Item -LiteralPath "lang\TypeSharp.Core\bin\$env:CONFIGURATION\net48\TypeSharp.Core.dll" -Destination $runtimeLibRoot
          Copy-Item -LiteralPath "lang\TypeSharp.Runtime\bin\$env:CONFIGURATION\net48\TypeSharp.Runtime.dll" -Destination $runtimeLibRoot

          @(
            "# TypeSharp Runtime $tag",
            '',
            'This archive contains the package-free net48 runtime libraries that generated TypeSharp assemblies may need beside host or consumer projects.',
            '',
            "Build metadata: $tag",
            "Source revision: $sourceRevision",
            'Runtime ABI: 0',
            'Runtime ABI status: preview',
            'Target framework: net48',
            '',
            '- lib/net48/TypeSharp.Core.dll',
            '- lib/net48/TypeSharp.Runtime.dll'
          ) | Set-Content -Encoding utf8 -Path (Join-Path $runtimeRoot 'README.md')

          $runtimeZip = Join-Path $releaseRoot "typesharp-runtime-net48-$tag.zip"
          Compress-Archive -Path (Join-Path $runtimeRoot '*') -DestinationPath $runtimeZip -Force

          $vsix = Get-ChildItem -Path vscode\typesharp -Filter '*.vsix' |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if ($null -eq $vsix) {
            throw 'VS Code extension packaging did not produce a .vsix file.'
          }
          Copy-Item -LiteralPath $vsix.FullName -Destination (Join-Path $releaseRoot "typesharp-vscode-$tag.vsix")

          $channel = if ($tag -like 'v0.*' -or $tag -like '*-*') { 'Preview' } else { 'Stable' }
          $releaseDate = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd')
          $releaseNotesPath = Join-Path $releaseRoot 'RELEASE_NOTES.md'
          @(
            "# TypeSharp $tag",
            '',
            "Date: $releaseDate",
            "Channel: $channel",
            "Build metadata: $tag",
            "Source revision: $sourceRevision",
            'Runtime ABI: 0',
            'Runtime ABI status: preview',
            'Default target framework: net48',
            '',
            '## Summary',
            '',
            'Preview release artifact set for the TypeSharp CLI, net48 runtime libraries, and VS Code extension.',
            '',
            '## Compatibility Matrix',
            '',
            '| CLI line | Language | Runtime ABI | Generated target | Runtime asset |',
            '| --- | --- | --- | --- | --- |',
            "| 0.1.0-preview | preview | 0 preview | net48 | typesharp-runtime-net48-$tag.zip |",
            '',
            '## Breaking Changes',
            '',
            'None.',
            '',
            '## Migration Notes',
            '',
            'Install a previous GitHub Release asset with a matching runtime ABI after verifying SHA256SUMS.txt.',
            '',
            '## Stable Features',
            '',
            'Generated projects target net48 with C# 7.3-compatible output.',
            '',
            '## Preview Features',
            '',
            'The CLI, language surface, VS Code extension, and Runtime ABI 0 remain preview.',
            '',
            '## Diagnostics And Tooling',
            '',
            'Use typesharp version, typesharp check, typesharp build, and typesharp explain to inspect installed artifact metadata and diagnostics.',
            '',
            '## Security',
            '',
            'Generated projects remain package-free by default and TypeSharp does not restore NuGet packages during check or build.',
            '',
            '## Checksums And Signing',
            '',
            'Signature policy: preview releases publish SHA256SUMS.txt as the artifact integrity gate; detached signatures and Authenticode signing are not published yet.',
            '',
            '## Artifacts',
            '',
            "- typesharp-cli-dotnet-$tag.zip: framework-dependent modern .NET CLI host with Windows typesharp.cmd wrapper.",
            "- typesharp-runtime-net48-$tag.zip: TypeSharp.Core and TypeSharp.Runtime net48 libraries.",
            "- typesharp-vscode-$tag.vsix: VS Code extension with bundled language server.",
            '- SHA256SUMS.txt: SHA-256 manifest for release assets.',
            '',
            '## Verification',
            '',
            'Use SHA256SUMS.txt to verify downloaded release assets.',
            '',
            '## Rollback',
            '',
            'Install a previous GitHub Release asset with a matching runtime ABI after verifying SHA256SUMS.txt.'
          ) | Set-Content -Encoding utf8 -Path $releaseNotesPath

          $generatedReleaseNotes = Get-Content -LiteralPath $releaseNotesPath -Raw
          $expectedReleaseNoteFragments = @(
            "# TypeSharp $tag",
            "Date: $releaseDate",
            "Channel: $channel",
            "Build metadata: $tag",
            "Source revision: $sourceRevision",
            'Runtime ABI: 0',
            'Runtime ABI status: preview',
            'Default target framework: net48',
            '## Summary',
            '## Compatibility Matrix',
            '| CLI line | Language | Runtime ABI | Generated target | Runtime asset |',
            "| 0.1.0-preview | preview | 0 preview | net48 | typesharp-runtime-net48-$tag.zip |",
            '## Breaking Changes',
            '## Migration Notes',
            '## Stable Features',
            '## Preview Features',
            '## Diagnostics And Tooling',
            '## Security',
            '## Checksums And Signing',
            '## Artifacts',
            '## Verification',
            '## Rollback',
            "typesharp-cli-dotnet-$tag.zip",
            "typesharp-runtime-net48-$tag.zip",
            "typesharp-vscode-$tag.vsix",
            'SHA256SUMS.txt',
            'Preview release artifact set for the TypeSharp CLI, net48 runtime libraries, and VS Code extension.',
            '| --- | --- | --- | --- | --- |',
            'None.',
            'Generated projects target net48 with C# 7.3-compatible output.',
            'The CLI, language surface, VS Code extension, and Runtime ABI 0 remain preview.',
            'Use typesharp version, typesharp check, typesharp build, and typesharp explain to inspect installed artifact metadata and diagnostics.',
            'Generated projects remain package-free by default and TypeSharp does not restore NuGet packages during check or build.',
            'Signature policy: preview releases publish SHA256SUMS.txt as the artifact integrity gate; detached signatures and Authenticode signing are not published yet.',
            "typesharp-cli-dotnet-$tag.zip: framework-dependent modern .NET CLI host with Windows typesharp.cmd wrapper.",
            "typesharp-runtime-net48-$tag.zip: TypeSharp.Core and TypeSharp.Runtime net48 libraries.",
            "typesharp-vscode-$tag.vsix: VS Code extension with bundled language server.",
            'SHA256SUMS.txt: SHA-256 manifest for release assets.',
            'Use SHA256SUMS.txt to verify downloaded release assets.',
            'Install a previous GitHub Release asset with a matching runtime ABI after verifying SHA256SUMS.txt.'
          )
          foreach ($fragment in $expectedReleaseNoteFragments) {
            if (-not $generatedReleaseNotes.Contains($fragment)) {
              throw "Generated RELEASE_NOTES.md is missing required content: $fragment"
            }
          }

          $checksumPath = Join-Path $releaseRoot 'SHA256SUMS.txt'
          Get-ChildItem -Path $releaseRoot -File |
            Where-Object { $_.Name -ne 'SHA256SUMS.txt' -and $_.Name -ne 'RELEASE_NOTES.md' } |
            Sort-Object Name |
            ForEach-Object {
              '{0}  {1}' -f (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant(), $_.Name
            } |
            Set-Content -Encoding ascii -Path $checksumPath

          $checksumAssetNames = @(
            Get-Content -LiteralPath $checksumPath |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              ForEach-Object {
                $parts = $_ -split '\s+', 2
                if ($parts.Count -ne 2 -or [string]::IsNullOrWhiteSpace($parts[1])) {
                  throw "Generated SHA256SUMS.txt entry is malformed: $_"
                }
                if ($parts[0] -notmatch '^[0-9a-f]{64}$') {
                  throw "Generated SHA256SUMS.txt hash for '$($parts[1])' is not lowercase SHA-256."
                }
                $parts[1]
              } |
              Sort-Object
          )
          $duplicateGeneratedChecksumAssetName = $checksumAssetNames |
            Group-Object |
            Where-Object { $_.Count -gt 1 } |
            Select-Object -First 1
          if ($null -ne $duplicateGeneratedChecksumAssetName) {
            throw "Generated SHA256SUMS.txt lists '$($duplicateGeneratedChecksumAssetName.Name)' more than once."
          }
          $expectedChecksumAssetNames = @(
            "typesharp-cli-dotnet-$tag.zip",
            "typesharp-runtime-net48-$tag.zip",
            "typesharp-vscode-$tag.vsix"
          ) | Sort-Object
          $checksumSetDifference = Compare-Object -ReferenceObject $expectedChecksumAssetNames -DifferenceObject $checksumAssetNames
          if ($null -ne $checksumSetDifference) {
            throw "Generated checksum manifest asset set mismatch. Expected '$($expectedChecksumAssetNames -join ', ')' but found '$($checksumAssetNames -join ', ')'."
          }

          function Assert-LocalArchiveContains([string] $archiveRoot, [string] $relativePath, [string] $message) {
            if (-not (Test-Path -LiteralPath (Join-Path $archiveRoot $relativePath) -PathType Leaf)) {
              throw $message
            }
          }

          function Assert-LocalTextContains([string] $value, [string] $expected, [string] $message) {
            if (-not $value.Contains($expected)) {
              throw $message
            }
          }

          function Assert-LocalTextNotContains([string] $value, [string] $unexpected, [string] $message) {
            if ($value.Contains($unexpected)) {
              throw $message
            }
          }

          $localShapeRoot = Join-Path $env:RUNNER_TEMP ("typesharp-release-local-shape-" + [Guid]::NewGuid().ToString('N'))
          New-Item -ItemType Directory -Force $localShapeRoot | Out-Null
          $localRepositoryRoot = (Resolve-Path $env:GITHUB_WORKSPACE).Path
          $resolvedLocalShapeRoot = (Resolve-Path $localShapeRoot).Path
          if ($resolvedLocalShapeRoot.StartsWith($localRepositoryRoot, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw 'Local release archive extraction workspace must be outside the repository checkout before upload.'
          }
          $localCliRoot = Join-Path $localShapeRoot 'cli'
          $localRuntimeRoot = Join-Path $localShapeRoot 'runtime'
          $localVsixRoot = Join-Path $localShapeRoot 'vscode'

          Expand-Archive -LiteralPath (Join-Path $releaseRoot "typesharp-cli-dotnet-$tag.zip") -DestinationPath $localCliRoot -Force
          Assert-LocalArchiveContains $localCliRoot 'typesharp.dll' 'Local CLI archive does not contain typesharp.dll before upload.'
          Assert-LocalArchiveContains $localCliRoot 'typesharp.cmd' 'Local CLI archive does not contain typesharp.cmd before upload.'
          Assert-LocalArchiveContains $localCliRoot 'TypeSharp.Compiler.dll' 'Local CLI archive does not contain TypeSharp.Compiler.dll before upload.'
          Assert-LocalArchiveContains $localCliRoot 'TypeSharp.LanguageServer.dll' 'Local CLI archive does not contain TypeSharp.LanguageServer.dll before upload.'
          Assert-LocalArchiveContains $localCliRoot 'README.md' 'Local CLI archive does not contain README.md before upload.'
          $localWrapperPath = Join-Path $localCliRoot 'typesharp.cmd'
          $localWrapper = Get-Content -Raw -LiteralPath $localWrapperPath
          Assert-LocalTextContains $localWrapper '@echo off' 'Local CLI wrapper does not disable command echo before upload.'
          Assert-LocalTextContains $localWrapper 'setlocal' 'Local CLI wrapper does not isolate environment changes before upload.'
          Assert-LocalTextContains $localWrapper 'set "TYPESHARP_HOME=%~dp0"' 'Local CLI wrapper does not set TYPESHARP_HOME to the extracted directory before upload.'
          Assert-LocalTextContains $localWrapper 'dotnet "%TYPESHARP_HOME%typesharp.dll" %*' 'Local CLI wrapper does not launch typesharp.dll through dotnet before upload.'
          $localOriginalPath = $env:PATH
          try {
            $env:PATH = "$localCliRoot;$env:PATH"
            $resolvedLocalTypeSharpCommand = (Get-Command typesharp -CommandType Application).Source
            $localInstalledVersionJsonText = typesharp version --json
            $localInstalledVersionJsonExitCode = $LASTEXITCODE
            $localInstalledVersionText = typesharp version
            $localInstalledVersionTextExitCode = $LASTEXITCODE
          }
          finally {
            $env:PATH = $localOriginalPath
          }
          if ($resolvedLocalTypeSharpCommand -ne $localWrapperPath) {
            throw "Local PATH smoke resolved typesharp to '$resolvedLocalTypeSharpCommand' instead of '$localWrapperPath' before upload."
          }
          if ($localInstalledVersionJsonExitCode -ne 0) {
            throw 'Local installed-command version --json failed before upload.'
          }
          $localInstalledVersion = ($localInstalledVersionJsonText -join "`n") | ConvertFrom-Json
          if ($localInstalledVersion.buildMetadata -ne $tag) {
            throw "Local installed-command build metadata '$($localInstalledVersion.buildMetadata)' did not match '$tag' before upload."
          }
          if ($localInstalledVersion.sourceRevision -ne $sourceRevision) {
            throw "Local installed-command source revision '$($localInstalledVersion.sourceRevision)' did not match checkout '$sourceRevision' before upload."
          }
          if ($localInstalledVersion.releaseChannel -ne $channel) {
            throw "Local installed-command release channel '$($localInstalledVersion.releaseChannel)' did not match expected '$channel' before upload."
          }
          if ($localInstalledVersion.targetDefault -ne 'net48') {
            throw "Local installed-command target default '$($localInstalledVersion.targetDefault)' did not match net48 before upload."
          }
          if ($localInstalledVersion.cliTargetFramework -ne 'net10.0') {
            throw "Local installed-command CLI target framework '$($localInstalledVersion.cliTargetFramework)' did not match net10.0 before upload."
          }
          if ($localInstalledVersion.runtimeTargetFramework -ne 'net48') {
            throw "Local installed-command runtime target framework '$($localInstalledVersion.runtimeTargetFramework)' did not match net48 before upload."
          }
          if ($localInstalledVersion.artifactKind -ne 'framework-dependent-dotnet') {
            throw "Local installed-command artifact kind '$($localInstalledVersion.artifactKind)' did not match framework-dependent-dotnet before upload."
          }
          if ($localInstalledVersion.runtimeAbi -ne 0) {
            throw "Local installed-command runtime ABI '$($localInstalledVersion.runtimeAbi)' did not match 0 before upload."
          }
          if ($localInstalledVersion.runtimeAbiStatus -ne 'preview') {
            throw "Local installed-command runtime ABI status '$($localInstalledVersion.runtimeAbiStatus)' did not match preview before upload."
          }
          if ($localInstalledVersionTextExitCode -ne 0) {
            throw 'Local installed-command version text failed before upload.'
          }
          $localInstalledVersionTextJoined = $localInstalledVersionText -join "`n"
          Assert-LocalTextContains $localInstalledVersionTextJoined 'TypeSharp CLI ' 'Local installed-command version text did not include the CLI version before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined 'Compiler ' 'Local installed-command version text did not include the compiler version before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined 'Language ' 'Local installed-command version text did not include the language version before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined "Release channel $channel" 'Local installed-command version text did not include the expected release channel before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined 'Runtime ABI 0' 'Local installed-command version text did not include the runtime ABI before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined 'Runtime ABI status preview' 'Local installed-command version text did not include the runtime ABI status before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined 'Target default net48' 'Local installed-command version text did not include the default target framework before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined 'CLI target net10.0' 'Local installed-command version text did not include the CLI target framework before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined 'Runtime target net48' 'Local installed-command version text did not include the runtime target framework before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined 'Artifact kind framework-dependent-dotnet' 'Local installed-command version text did not include the artifact kind before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined "Build metadata $tag" 'Local installed-command version text did not include the release build metadata before upload.'
          Assert-LocalTextContains $localInstalledVersionTextJoined "Source revision $sourceRevision" 'Local installed-command version text did not include the release source revision before upload.'
          $localVersionJsonText = & $localWrapperPath version --json
          if ($LASTEXITCODE -ne 0) {
            throw 'Local CLI version --json failed before upload.'
          }
          $localVersion = ($localVersionJsonText -join "`n") | ConvertFrom-Json
          if ($localVersion.buildMetadata -ne $tag) {
            throw "Local CLI build metadata '$($localVersion.buildMetadata)' did not match '$tag' before upload."
          }
          if ($localVersion.sourceRevision -ne $sourceRevision) {
            throw "Local CLI source revision '$($localVersion.sourceRevision)' did not match checkout '$sourceRevision' before upload."
          }
          if ($localVersion.releaseChannel -ne $channel) {
            throw "Local CLI release channel '$($localVersion.releaseChannel)' did not match expected '$channel' before upload."
          }
          if ($localVersion.targetDefault -ne 'net48') {
            throw "Local CLI target default '$($localVersion.targetDefault)' did not match net48 before upload."
          }
          if ($localVersion.cliTargetFramework -ne 'net10.0') {
            throw "Local CLI target framework '$($localVersion.cliTargetFramework)' did not match net10.0 before upload."
          }
          if ($localVersion.runtimeTargetFramework -ne 'net48') {
            throw "Local CLI runtime target framework '$($localVersion.runtimeTargetFramework)' did not match net48 before upload."
          }
          if ($localVersion.artifactKind -ne 'framework-dependent-dotnet') {
            throw "Local CLI artifact kind '$($localVersion.artifactKind)' did not match framework-dependent-dotnet before upload."
          }
          if ($localVersion.runtimeAbi -ne 0) {
            throw "Local CLI runtime ABI '$($localVersion.runtimeAbi)' did not match 0 before upload."
          }
          if ($localVersion.runtimeAbiStatus -ne 'preview') {
            throw "Local CLI runtime ABI status '$($localVersion.runtimeAbiStatus)' did not match preview before upload."
          }
          $localVersionText = & $localWrapperPath version
          if ($LASTEXITCODE -ne 0) {
            throw 'Local CLI version text failed before upload.'
          }
          $localVersionTextJoined = $localVersionText -join "`n"
          Assert-LocalTextContains $localVersionTextJoined 'TypeSharp CLI ' 'Local CLI version text did not include the CLI version before upload.'
          Assert-LocalTextContains $localVersionTextJoined 'Compiler ' 'Local CLI version text did not include the compiler version before upload.'
          Assert-LocalTextContains $localVersionTextJoined 'Language ' 'Local CLI version text did not include the language version before upload.'
          Assert-LocalTextContains $localVersionTextJoined "Release channel $channel" 'Local CLI version text did not include the expected release channel before upload.'
          Assert-LocalTextContains $localVersionTextJoined 'Runtime ABI 0' 'Local CLI version text did not include the runtime ABI before upload.'
          Assert-LocalTextContains $localVersionTextJoined 'Runtime ABI status preview' 'Local CLI version text did not include the runtime ABI status before upload.'
          Assert-LocalTextContains $localVersionTextJoined 'Target default net48' 'Local CLI version text did not include the default target framework before upload.'
          Assert-LocalTextContains $localVersionTextJoined 'CLI target net10.0' 'Local CLI version text did not include the CLI target framework before upload.'
          Assert-LocalTextContains $localVersionTextJoined 'Runtime target net48' 'Local CLI version text did not include the runtime target framework before upload.'
          Assert-LocalTextContains $localVersionTextJoined 'Artifact kind framework-dependent-dotnet' 'Local CLI version text did not include the artifact kind before upload.'
          Assert-LocalTextContains $localVersionTextJoined "Build metadata $tag" 'Local CLI version text did not include the release build metadata before upload.'
          Assert-LocalTextContains $localVersionTextJoined "Source revision $sourceRevision" 'Local CLI version text did not include the release source revision before upload.'
          $originalPath = $env:PATH
          $previousNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          try {
            $env:PATH = $localCliRoot
            $localMissingHostOutput = & $localWrapperPath version 2>&1
            $localMissingHostExitCode = $LASTEXITCODE
          }
          finally {
            $env:PATH = $originalPath
            $PSNativeCommandUseErrorActionPreference = $previousNativeCommandPreference
          }
          if ($localMissingHostExitCode -eq 0) {
            throw 'Local CLI host-prerequisite smoke unexpectedly succeeded without dotnet on PATH before upload.'
          }
          Assert-LocalTextContains ($localMissingHostOutput -join "`n") 'dotnet' 'Local CLI host-prerequisite smoke did not report the missing dotnet host before upload.'
          $global:LASTEXITCODE = 0
          $localCliReadme = Get-Content -Raw -LiteralPath (Join-Path $localCliRoot 'README.md')
          Assert-LocalTextContains $localCliReadme "# TypeSharp CLI $tag" 'Local CLI README does not identify the release tag before upload.'
          Assert-LocalTextContains $localCliReadme "Build metadata: $tag" 'Local CLI README does not include build metadata before upload.'
          Assert-LocalTextContains $localCliReadme "Source revision: $sourceRevision" 'Local CLI README source revision does not match the checkout before upload.'
          Assert-LocalTextContains $localCliReadme 'Run `typesharp.cmd version` from this directory' 'Local CLI README does not document the local wrapper command before upload.'
          Assert-LocalTextContains $localCliReadme 'add the extracted directory to `PATH` and run `typesharp version`' 'Local CLI README does not document the PATH command route before upload.'
          Assert-LocalTextNotContains $localCliReadme 'dotnet cli\TypeSharp.Cli' 'Local CLI README must not document repo-local CLI DLL commands before upload.'
          Assert-LocalTextNotContains $localCliReadme 'source-built' 'Local CLI README must not document the source-built fallback before upload.'
          Assert-LocalTextNotContains $localCliReadme 'dotnet tool install' 'Local CLI README must not document a hidden global dotnet tool install before upload.'

          Expand-Archive -LiteralPath (Join-Path $releaseRoot "typesharp-runtime-net48-$tag.zip") -DestinationPath $localRuntimeRoot -Force
          Assert-LocalArchiveContains $localRuntimeRoot 'README.md' 'Local runtime archive does not contain README.md before upload.'
          Assert-LocalArchiveContains $localRuntimeRoot 'lib\net48\TypeSharp.Core.dll' 'Local runtime archive does not contain lib/net48/TypeSharp.Core.dll before upload.'
          Assert-LocalArchiveContains $localRuntimeRoot 'lib\net48\TypeSharp.Runtime.dll' 'Local runtime archive does not contain lib/net48/TypeSharp.Runtime.dll before upload.'
          $localRuntimeReadme = Get-Content -Raw -LiteralPath (Join-Path $localRuntimeRoot 'README.md')
          Assert-LocalTextContains $localRuntimeReadme "# TypeSharp Runtime $tag" 'Local runtime README does not identify the release tag before upload.'
          Assert-LocalTextContains $localRuntimeReadme "Build metadata: $tag" 'Local runtime README does not include build metadata before upload.'
          Assert-LocalTextContains $localRuntimeReadme "Source revision: $sourceRevision" 'Local runtime README source revision does not match the checkout before upload.'
          Assert-LocalTextContains $localRuntimeReadme 'Runtime ABI: 0' 'Local runtime README does not include runtime ABI before upload.'
          Assert-LocalTextContains $localRuntimeReadme 'Runtime ABI status: preview' 'Local runtime README does not include runtime ABI status before upload.'
          Assert-LocalTextContains $localRuntimeReadme 'Target framework: net48' 'Local runtime README does not include target framework before upload.'
          Assert-LocalTextContains $localRuntimeReadme 'lib/net48/TypeSharp.Core.dll' 'Local runtime README does not list TypeSharp.Core.dll before upload.'
          Assert-LocalTextContains $localRuntimeReadme 'lib/net48/TypeSharp.Runtime.dll' 'Local runtime README does not list TypeSharp.Runtime.dll before upload.'
          Assert-LocalTextNotContains $localRuntimeReadme 'dotnet cli\TypeSharp.Cli' 'Local runtime README must not document repo-local CLI DLL commands before upload.'
          Assert-LocalTextNotContains $localRuntimeReadme 'source-built' 'Local runtime README must not document the source-built fallback before upload.'
          Assert-LocalTextNotContains $localRuntimeReadme 'dotnet tool install' 'Local runtime README must not document a hidden global dotnet tool install before upload.'

          $localVsixZip = Join-Path $localShapeRoot "typesharp-vscode-$tag.zip"
          Copy-Item -LiteralPath (Join-Path $releaseRoot "typesharp-vscode-$tag.vsix") -Destination $localVsixZip -Force
          Expand-Archive -LiteralPath $localVsixZip -DestinationPath $localVsixRoot -Force
          Assert-LocalArchiveContains $localVsixRoot 'extension\package.json' 'Local VSIX archive does not contain extension/package.json before upload.'
          Assert-LocalArchiveContains $localVsixRoot 'extension\extension.js' 'Local VSIX archive does not contain extension/extension.js before upload.'
          Assert-LocalArchiveContains $localVsixRoot 'extension\language-configuration.json' 'Local VSIX archive does not contain extension/language-configuration.json before upload.'
          Assert-LocalArchiveContains $localVsixRoot 'extension\README.md' 'Local VSIX archive does not contain extension/README.md before upload.'
          Assert-LocalArchiveContains $localVsixRoot 'extension\MARKETPLACE.md' 'Local VSIX archive does not contain extension/MARKETPLACE.md before upload.'
          Assert-LocalArchiveContains $localVsixRoot 'extension\syntaxes\typesharp.tmLanguage.json' 'Local VSIX archive does not contain extension/syntaxes/typesharp.tmLanguage.json before upload.'
          Assert-LocalArchiveContains $localVsixRoot 'extension\server\TypeSharp.LanguageServer.dll' 'Local VSIX archive does not contain extension/server/TypeSharp.LanguageServer.dll before upload.'
          $localVsixPackage = Get-Content -Raw -LiteralPath (Join-Path $localVsixRoot 'extension\package.json') | ConvertFrom-Json
          if ($localVsixPackage.name -ne 'typesharp-vscode') {
            throw "Local VSIX package name '$($localVsixPackage.name)' did not match typesharp-vscode before upload."
          }
          if ($localVsixPackage.displayName -ne 'TypeSharp') {
            throw "Local VSIX display name '$($localVsixPackage.displayName)' did not match TypeSharp before upload."
          }
          if ($localVsixPackage.description -ne 'Language support for TypeSharp .tysh source files.') {
            throw "Local VSIX description '$($localVsixPackage.description)' did not match the expected release description before upload."
          }
          if ($localVsixPackage.version -ne '0.1.0') {
            throw "Local VSIX package version '$($localVsixPackage.version)' did not match 0.1.0 before upload."
          }
          if ($localVsixPackage.publisher -ne 'typesharp') {
            throw "Local VSIX publisher '$($localVsixPackage.publisher)' did not match typesharp before upload."
          }
          if ($localVsixPackage.main -ne './extension.js') {
            throw "Local VSIX main '$($localVsixPackage.main)' did not match ./extension.js before upload."
          }
          if (-not @($localVsixPackage.categories).Contains('Programming Languages')) {
            throw 'Local VSIX package does not list the Programming Languages category before upload.'
          }
          if (-not @($localVsixPackage.activationEvents).Contains('onLanguage:typesharp')) {
            throw 'Local VSIX package does not activate on the TypeSharp language before upload.'
          }
          $localVsixLanguage = @($localVsixPackage.contributes.languages | Where-Object { $_.id -eq 'typesharp' }) | Select-Object -First 1
          if ($null -eq $localVsixLanguage -or -not @($localVsixLanguage.extensions).Contains('.tysh')) {
            throw 'Local VSIX package does not contribute the TypeSharp .tysh language before upload.'
          }
          $localVsixGrammar = @($localVsixPackage.contributes.grammars | Where-Object { $_.language -eq 'typesharp' }) | Select-Object -First 1
          if ($null -eq $localVsixGrammar -or $localVsixGrammar.scopeName -ne 'source.typesharp' -or $localVsixGrammar.path -ne './syntaxes/typesharp.tmLanguage.json') {
            throw 'Local VSIX package does not contribute the expected TypeSharp grammar before upload.'
          }

          Get-Content $checksumPath

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: typesharp-release-artifacts-${{ github.run_id }}
          path: artifacts/release
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $releaseRoot = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'
          $notesPath = Join-Path $releaseRoot 'RELEASE_NOTES.md'
          $assetPaths = @(
            Get-ChildItem -Path $releaseRoot -File |
              Where-Object { $_.Name -ne 'RELEASE_NOTES.md' } |
              Sort-Object Name |
              ForEach-Object { $_.FullName }
          )

          if ($assetPaths.Count -eq 0) {
            throw 'No release assets were produced.'
          }
          if (-not (Test-Path -LiteralPath $notesPath -PathType Leaf)) {
            throw 'Release notes were not produced.'
          }
          if ((Get-Item -LiteralPath $notesPath).Length -eq 0) {
            throw 'Release notes were empty before publication.'
          }
          $releaseNotesText = Get-Content -LiteralPath $notesPath -Raw
          if ([string]::IsNullOrWhiteSpace($releaseNotesText)) {
            throw 'Release notes contained only whitespace before publication.'
          }
          $expectedReleaseNoteTitlePattern = '(?m)^# TypeSharp ' + [regex]::Escape($env:RELEASE_TAG) + '\r?$'
          if ($releaseNotesText -notmatch $expectedReleaseNoteTitlePattern) {
            throw "Release notes title did not match TypeSharp $env:RELEASE_TAG before publication."
          }
          $releaseNoteLines = @($releaseNotesText -split '\r?\n')
          $releaseNoteTopLevelHeadings = @($releaseNoteLines | Where-Object { $_.StartsWith('# ', [StringComparison]::Ordinal) })
          if ($releaseNoteTopLevelHeadings.Count -ne 1 -or $releaseNoteTopLevelHeadings[0] -ne "# TypeSharp $env:RELEASE_TAG") {
            throw "Release notes must contain exactly one top-level title before publication: # TypeSharp $env:RELEASE_TAG"
          }
          $releaseNoteDateLine = @($releaseNotesText -split '\r?\n' | Where-Object { $_ -like 'Date: *' } | Select-Object -First 1)
          if ($releaseNoteDateLine.Count -eq 0 -or $releaseNoteDateLine[0] -notmatch '^Date: \d{4}-\d{2}-\d{2}$') {
            throw 'Release notes date did not use yyyy-MM-dd before publication.'
          }

          $expectedPrerelease = $env:RELEASE_TAG -like 'v0.*' -or $env:RELEASE_TAG -like '*-*'
          $expectedReleaseNoteChannel = if ($expectedPrerelease) { 'Preview' } else { 'Stable' }
          $releaseNoteChannelLine = @($releaseNotesText -split '\r?\n' | Where-Object { $_ -like 'Channel: *' } | Select-Object -First 1)
          if ($releaseNoteChannelLine.Count -eq 0 -or $releaseNoteChannelLine[0] -ne "Channel: $expectedReleaseNoteChannel") {
            throw "Release notes channel did not match $expectedReleaseNoteChannel before publication."
          }
          if (-not $releaseNotesText.Contains("Build metadata: $env:RELEASE_TAG")) {
            throw "Release notes build metadata did not match $env:RELEASE_TAG before publication."
          }
          $expectedReleaseNoteSourceRevision = git rev-parse --short=12 HEAD
          if (-not $releaseNotesText.Contains("Source revision: $expectedReleaseNoteSourceRevision")) {
            throw "Release notes source revision did not match checkout $expectedReleaseNoteSourceRevision before publication."
          }
          foreach ($expectedReleaseNoteRuntimeFragment in @('Runtime ABI: 0', 'Runtime ABI status: preview', 'Default target framework: net48')) {
            if (-not $releaseNotesText.Contains($expectedReleaseNoteRuntimeFragment)) {
              throw "Release notes runtime metadata missing before publication: $expectedReleaseNoteRuntimeFragment"
            }
          }
          $expectedReleaseNoteMetadataLines = @(
            "# TypeSharp $env:RELEASE_TAG",
            $releaseNoteDateLine[0],
            "Channel: $expectedReleaseNoteChannel",
            "Build metadata: $env:RELEASE_TAG",
            "Source revision: $expectedReleaseNoteSourceRevision",
            'Runtime ABI: 0',
            'Runtime ABI status: preview',
            'Default target framework: net48'
          )
          foreach ($expectedReleaseNoteMetadataPrefix in @(
            '# TypeSharp ',
            'Date:',
            'Channel:',
            'Build metadata:',
            'Source revision:',
            'Runtime ABI:',
            'Runtime ABI status:',
            'Default target framework:'
          )) {
            $releaseNoteMetadataPrefixMatches = @($releaseNoteLines | Where-Object { $_.StartsWith($expectedReleaseNoteMetadataPrefix, [StringComparison]::Ordinal) })
            if ($releaseNoteMetadataPrefixMatches.Count -ne 1) {
              throw "Release notes metadata prefix '$expectedReleaseNoteMetadataPrefix' must appear exactly once before publication."
            }
          }
          $releaseNoteMetadataCursor = -1
          foreach ($expectedReleaseNoteMetadataLine in $expectedReleaseNoteMetadataLines) {
            $releaseNoteMetadataIndex = $releaseNotesText.IndexOf($expectedReleaseNoteMetadataLine, [StringComparison]::Ordinal)
            if ($releaseNoteMetadataIndex -lt 0) {
              throw "Release notes metadata line missing before publication: $expectedReleaseNoteMetadataLine"
            }
            if ($releaseNoteMetadataIndex -le $releaseNoteMetadataCursor) {
              throw "Release notes metadata order mismatch before publication: $expectedReleaseNoteMetadataLine"
            }
            $releaseNoteMetadataCursor = $releaseNoteMetadataIndex
          }
          $releaseNoteFirstSectionIndex = $releaseNotesText.IndexOf('## Summary', [StringComparison]::Ordinal)
          if ($releaseNoteFirstSectionIndex -ge 0 -and $releaseNoteFirstSectionIndex -le $releaseNoteMetadataCursor) {
            throw 'Release notes metadata block must appear before mandatory sections before publication.'
          }
          $expectedReleaseNoteHeaderPrefix = @(
            "# TypeSharp $env:RELEASE_TAG",
            '',
            $releaseNoteDateLine[0],
            "Channel: $expectedReleaseNoteChannel",
            "Build metadata: $env:RELEASE_TAG",
            "Source revision: $expectedReleaseNoteSourceRevision",
            'Runtime ABI: 0',
            'Runtime ABI status: preview',
            'Default target framework: net48',
            ''
          ) -join "`n"
          $normalizedReleaseNotesText = $releaseNotesText.Replace("`r`n", "`n")
          if (-not $normalizedReleaseNotesText.StartsWith($expectedReleaseNoteHeaderPrefix, [StringComparison]::Ordinal)) {
            throw 'Release notes must start with the canonical metadata header before publication.'
          }
          $expectedReleaseNoteHeaderAndFirstSectionPrefix = $expectedReleaseNoteHeaderPrefix + "`n## Summary"
          if (-not $normalizedReleaseNotesText.StartsWith($expectedReleaseNoteHeaderAndFirstSectionPrefix, [StringComparison]::Ordinal)) {
            throw 'Release notes Summary section must immediately follow the canonical metadata header before publication.'
          }
          $expectedReleaseNoteSections = @(
            '## Summary',
            '## Compatibility Matrix',
            '## Breaking Changes',
            '## Migration Notes',
            '## Stable Features',
            '## Preview Features',
            '## Diagnostics And Tooling',
            '## Security',
            '## Checksums And Signing',
            '## Artifacts',
            '## Verification',
            '## Rollback'
          )
          $releaseNoteSectionCursor = -1
          $releaseNoteSections = @($releaseNoteLines | Where-Object { $_.StartsWith('## ', [StringComparison]::Ordinal) })
          $releaseNoteUnexpectedSections = @($releaseNoteSections | Where-Object { $expectedReleaseNoteSections -notcontains $_ })
          if ($releaseNoteUnexpectedSections.Count -ne 0) {
            throw "Release notes contained unexpected sections before publication: $($releaseNoteUnexpectedSections -join ', ')"
          }
          if ($releaseNoteSections.Count -ne $expectedReleaseNoteSections.Count) {
            throw "Release notes section set count mismatch before publication. Expected $($expectedReleaseNoteSections.Count) but found $($releaseNoteSections.Count)."
          }
          foreach ($expectedReleaseNoteSection in $expectedReleaseNoteSections) {
            $releaseNoteSectionMatches = @($releaseNotesText -split '\r?\n' | Where-Object { $_ -eq $expectedReleaseNoteSection })
            if ($releaseNoteSectionMatches.Count -ne 1) {
              throw "Release notes mandatory section must appear exactly once before publication: $expectedReleaseNoteSection"
            }
            $releaseNoteSectionIndex = $releaseNotesText.IndexOf($expectedReleaseNoteSection, [StringComparison]::Ordinal)
            if ($releaseNoteSectionIndex -lt 0) {
              throw "Release notes mandatory section missing before publication: $expectedReleaseNoteSection"
            }
            if ($releaseNoteSectionIndex -le $releaseNoteSectionCursor) {
              throw "Release notes mandatory section order mismatch before publication: $expectedReleaseNoteSection"
            }
            $releaseNoteSectionCursor = $releaseNoteSectionIndex
          }
          if ($releaseNotesText -notmatch '(?m)^## Breaking Changes\r?\n\r?\nNone\.\r?$') {
            throw 'Release notes Breaking Changes section did not explicitly say None before publication.'
          }
          $expectedReleaseNoteSummary = 'Preview release artifact set for the TypeSharp CLI, net48 runtime libraries, and VS Code extension.'
          if (-not $releaseNotesText.Contains($expectedReleaseNoteSummary)) {
            throw 'Release notes Summary artifact set missing before publication.'
          }
          if ($releaseNotesText -notmatch '(?m)^## Summary\r?\n\r?\nPreview release artifact set for the TypeSharp CLI, net48 runtime libraries, and VS Code extension\.\r?$') {
            throw 'Release notes Summary section body mismatch before publication.'
          }
          $expectedReleaseNoteStableTargetPolicy = 'Generated projects target net48 with C# 7.3-compatible output.'
          if (-not $releaseNotesText.Contains($expectedReleaseNoteStableTargetPolicy)) {
            throw 'Release notes stable target policy missing before publication.'
          }
          if ($releaseNotesText -notmatch '(?m)^## Stable Features\r?\n\r?\nGenerated projects target net48 with C# 7\.3-compatible output\.\r?$') {
            throw 'Release notes Stable Features section body mismatch before publication.'
          }
          $expectedReleaseNotePreviewBoundary = 'The CLI, language surface, VS Code extension, and Runtime ABI 0 remain preview.'
          if (-not $releaseNotesText.Contains($expectedReleaseNotePreviewBoundary)) {
            throw 'Release notes preview boundary missing before publication.'
          }
          if ($releaseNotesText -notmatch '(?m)^## Preview Features\r?\n\r?\nThe CLI, language surface, VS Code extension, and Runtime ABI 0 remain preview\.\r?$') {
            throw 'Release notes Preview Features section body mismatch before publication.'
          }
          $expectedReleaseNoteDiagnosticsGuidance = 'Use typesharp version, typesharp check, typesharp build, and typesharp explain to inspect installed artifact metadata and diagnostics.'
          if (-not $releaseNotesText.Contains($expectedReleaseNoteDiagnosticsGuidance)) {
            throw 'Release notes diagnostics/tooling guidance missing before publication.'
          }
          if ($releaseNotesText -notmatch '(?m)^## Diagnostics And Tooling\r?\n\r?\nUse typesharp version, typesharp check, typesharp build, and typesharp explain to inspect installed artifact metadata and diagnostics\.\r?$') {
            throw 'Release notes Diagnostics And Tooling section body mismatch before publication.'
          }
          if ($releaseNotesText -notmatch '(?m)^## Migration Notes\r?\n\r?\nInstall a previous GitHub Release asset with a matching runtime ABI after verifying SHA256SUMS\.txt\.\r?$') {
            throw 'Release notes Migration Notes guidance missing before publication.'
          }
          $expectedReleaseNoteSecurityPolicy = 'Generated projects remain package-free by default and TypeSharp does not restore NuGet packages during check or build.'
          if (-not $releaseNotesText.Contains($expectedReleaseNoteSecurityPolicy)) {
            throw 'Release notes Security no-restore policy missing before publication.'
          }
          if ($releaseNotesText -notmatch '(?m)^## Security\r?\n\r?\nGenerated projects remain package-free by default and TypeSharp does not restore NuGet packages during check or build\.\r?$') {
            throw 'Release notes Security section body mismatch before publication.'
          }
          $expectedReleaseNoteMatrixRows = @(
            '| CLI line | Language | Runtime ABI | Generated target | Runtime asset |',
            '| --- | --- | --- | --- | --- |',
            "| 0.1.0-preview | preview | 0 preview | net48 | typesharp-runtime-net48-$env:RELEASE_TAG.zip |"
          )
          foreach ($expectedReleaseNoteMatrixFragment in $expectedReleaseNoteMatrixRows) {
            $releaseNoteMatrixFragmentMatches = @($releaseNotesText -split '\r?\n' | Where-Object { $_ -eq $expectedReleaseNoteMatrixFragment })
            if ($releaseNoteMatrixFragmentMatches.Count -ne 1) {
              throw "Release notes compatibility matrix fragment must appear exactly once before publication: $expectedReleaseNoteMatrixFragment"
            }
            if (-not $releaseNotesText.Contains($expectedReleaseNoteMatrixFragment)) {
              throw "Release notes compatibility matrix missing before publication: $expectedReleaseNoteMatrixFragment"
            }
          }
          $releaseNoteMatrixSectionStart = [Array]::IndexOf($releaseNoteLines, '## Compatibility Matrix')
          $releaseNoteMatrixSectionEnd = [Array]::IndexOf($releaseNoteLines, '## Breaking Changes')
          if ($releaseNoteMatrixSectionStart -lt 0 -or $releaseNoteMatrixSectionEnd -le $releaseNoteMatrixSectionStart) {
            throw 'Release notes compatibility matrix section boundaries were not canonical before publication.'
          }
          $releaseNoteMatrixRows = @($releaseNoteLines[($releaseNoteMatrixSectionStart + 1)..($releaseNoteMatrixSectionEnd - 1)] | Where-Object { $_.StartsWith('| ', [StringComparison]::Ordinal) })
          $releaseNoteUnexpectedMatrixRows = @($releaseNoteMatrixRows | Where-Object { $expectedReleaseNoteMatrixRows -notcontains $_ })
          if ($releaseNoteUnexpectedMatrixRows.Count -ne 0) {
            throw "Release notes contained unexpected compatibility matrix rows before publication: $($releaseNoteUnexpectedMatrixRows -join ', ')"
          }
          if ($releaseNoteMatrixRows.Count -ne $expectedReleaseNoteMatrixRows.Count) {
            throw "Release notes compatibility matrix row count mismatch before publication. Expected $($expectedReleaseNoteMatrixRows.Count) but found $($releaseNoteMatrixRows.Count)."
          }
          for ($releaseNoteMatrixRowIndex = 0; $releaseNoteMatrixRowIndex -lt $expectedReleaseNoteMatrixRows.Count; $releaseNoteMatrixRowIndex++) {
            if ($releaseNoteMatrixRows[$releaseNoteMatrixRowIndex] -ne $expectedReleaseNoteMatrixRows[$releaseNoteMatrixRowIndex]) {
              throw "Release notes compatibility matrix row order mismatch before publication at index $releaseNoteMatrixRowIndex."
            }
          }
          foreach ($expectedReleaseNoteArtifactName in @(
            "typesharp-cli-dotnet-$env:RELEASE_TAG.zip",
            "typesharp-runtime-net48-$env:RELEASE_TAG.zip",
            "typesharp-vscode-$env:RELEASE_TAG.vsix",
            'SHA256SUMS.txt'
          )) {
            if (-not $releaseNotesText.Contains($expectedReleaseNoteArtifactName)) {
              throw "Release notes artifact name missing before publication: $expectedReleaseNoteArtifactName"
            }
          }
          $expectedReleaseNoteArtifactDescriptions = @(
            "- typesharp-cli-dotnet-$env:RELEASE_TAG.zip: framework-dependent modern .NET CLI host with Windows typesharp.cmd wrapper.",
            "- typesharp-runtime-net48-$env:RELEASE_TAG.zip: TypeSharp.Core and TypeSharp.Runtime net48 libraries.",
            "- typesharp-vscode-$env:RELEASE_TAG.vsix: VS Code extension with bundled language server.",
            '- SHA256SUMS.txt: SHA-256 manifest for release assets.'
          )
          $releaseNoteArtifactSectionStart = [Array]::IndexOf($releaseNoteLines, '## Artifacts')
          $releaseNoteArtifactSectionEnd = [Array]::IndexOf($releaseNoteLines, '## Verification')
          if ($releaseNoteArtifactSectionStart -lt 0 -or $releaseNoteArtifactSectionEnd -le $releaseNoteArtifactSectionStart) {
            throw 'Release notes artifact section boundaries were not canonical before publication.'
          }
          $releaseNoteArtifactDescriptionRows = @($releaseNoteLines[($releaseNoteArtifactSectionStart + 1)..($releaseNoteArtifactSectionEnd - 1)] | Where-Object { $_.StartsWith('- ', [StringComparison]::Ordinal) })
          $releaseNoteUnexpectedArtifactDescriptions = @($releaseNoteArtifactDescriptionRows | Where-Object { $expectedReleaseNoteArtifactDescriptions -notcontains $_ })
          if ($releaseNoteUnexpectedArtifactDescriptions.Count -ne 0) {
            throw "Release notes contained unexpected artifact descriptions before publication: $($releaseNoteUnexpectedArtifactDescriptions -join ', ')"
          }
          if ($releaseNoteArtifactDescriptionRows.Count -ne $expectedReleaseNoteArtifactDescriptions.Count) {
            throw "Release notes artifact description row count mismatch before publication. Expected $($expectedReleaseNoteArtifactDescriptions.Count) but found $($releaseNoteArtifactDescriptionRows.Count)."
          }
          for ($releaseNoteArtifactDescriptionIndex = 0; $releaseNoteArtifactDescriptionIndex -lt $expectedReleaseNoteArtifactDescriptions.Count; $releaseNoteArtifactDescriptionIndex++) {
            if ($releaseNoteArtifactDescriptionRows[$releaseNoteArtifactDescriptionIndex] -ne $expectedReleaseNoteArtifactDescriptions[$releaseNoteArtifactDescriptionIndex]) {
              throw "Release notes artifact description order mismatch before publication at index $releaseNoteArtifactDescriptionIndex."
            }
          }
          foreach ($expectedReleaseNoteArtifactDescription in $expectedReleaseNoteArtifactDescriptions) {
            $releaseNoteArtifactDescriptionMatches = @($releaseNotesText -split '\r?\n' | Where-Object { $_ -eq $expectedReleaseNoteArtifactDescription })
            if ($releaseNoteArtifactDescriptionMatches.Count -ne 1) {
              throw "Release notes artifact description must appear exactly once before publication: $expectedReleaseNoteArtifactDescription"
            }
            if (-not $releaseNotesText.Contains($expectedReleaseNoteArtifactDescription)) {
              throw "Release notes artifact description missing before publication: $expectedReleaseNoteArtifactDescription"
            }
          }
          $expectedReleaseNoteSignaturePolicy = 'Signature policy: preview releases publish SHA256SUMS.txt as the artifact integrity gate; detached signatures and Authenticode signing are not published yet.'
          if (-not $releaseNotesText.Contains($expectedReleaseNoteSignaturePolicy)) {
            throw 'Release notes signature policy missing before publication.'
          }
          $expectedReleaseNoteVerificationGuidance = 'Use SHA256SUMS.txt to verify downloaded release assets.'
          if (-not $releaseNotesText.Contains($expectedReleaseNoteVerificationGuidance)) {
            throw 'Release notes verification guidance missing before publication.'
          }
          if ($releaseNotesText -notmatch '(?m)^## Checksums And Signing\r?\n\r?\nSignature policy: preview releases publish SHA256SUMS\.txt as the artifact integrity gate; detached signatures and Authenticode signing are not published yet\.\r?$') {
            throw 'Release notes Checksums And Signing section policy missing before publication.'
          }
          if ($releaseNotesText -notmatch '(?m)^## Verification\r?\n\r?\nUse SHA256SUMS\.txt to verify downloaded release assets\.\r?$') {
            throw 'Release notes Verification section guidance missing before publication.'
          }
          $expectedReleaseNoteRollbackGuidance = 'Install a previous GitHub Release asset with a matching runtime ABI after verifying SHA256SUMS.txt.'
          if (-not $releaseNotesText.Contains($expectedReleaseNoteRollbackGuidance)) {
            throw 'Release notes rollback guidance missing before publication.'
          }
          foreach ($expectedReleaseNotePolicyLine in @(
            $expectedReleaseNoteSummary,
            $expectedReleaseNoteStableTargetPolicy,
            $expectedReleaseNotePreviewBoundary,
            $expectedReleaseNoteDiagnosticsGuidance,
            $expectedReleaseNoteSecurityPolicy,
            $expectedReleaseNoteSignaturePolicy,
            $expectedReleaseNoteVerificationGuidance
          )) {
            $releaseNotePolicyLineMatches = @($releaseNoteLines | Where-Object { $_ -eq $expectedReleaseNotePolicyLine })
            if ($releaseNotePolicyLineMatches.Count -ne 1) {
              throw "Release notes policy line must appear exactly once before publication: $expectedReleaseNotePolicyLine"
            }
          }
          $releaseNoteRollbackGuidanceMatches = @($releaseNoteLines | Where-Object { $_ -eq $expectedReleaseNoteRollbackGuidance })
          if ($releaseNoteRollbackGuidanceMatches.Count -ne 2) {
            throw "Release notes rollback guidance must appear exactly twice before publication: $expectedReleaseNoteRollbackGuidance"
          }
          if ($releaseNotesText -notmatch '(?m)^## Rollback\r?\n\r?\nInstall a previous GitHub Release asset with a matching runtime ABI after verifying SHA256SUMS\.txt\.\r?$') {
            throw 'Release notes Rollback section guidance missing before publication.'
          }
          $expectedReleaseNoteSectionBodies = [ordered]@{
            '## Summary' = @($expectedReleaseNoteSummary)
            '## Compatibility Matrix' = $expectedReleaseNoteMatrixRows
            '## Breaking Changes' = @('None.')
            '## Migration Notes' = @($expectedReleaseNoteRollbackGuidance)
            '## Stable Features' = @($expectedReleaseNoteStableTargetPolicy)
            '## Preview Features' = @($expectedReleaseNotePreviewBoundary)
            '## Diagnostics And Tooling' = @($expectedReleaseNoteDiagnosticsGuidance)
            '## Security' = @($expectedReleaseNoteSecurityPolicy)
            '## Checksums And Signing' = @($expectedReleaseNoteSignaturePolicy)
            '## Artifacts' = $expectedReleaseNoteArtifactDescriptions
            '## Verification' = @($expectedReleaseNoteVerificationGuidance)
            '## Rollback' = @($expectedReleaseNoteRollbackGuidance)
          }
          for ($releaseNoteSectionBodyIndex = 0; $releaseNoteSectionBodyIndex -lt $expectedReleaseNoteSections.Count; $releaseNoteSectionBodyIndex++) {
            $releaseNoteSectionBodyName = $expectedReleaseNoteSections[$releaseNoteSectionBodyIndex]
            $releaseNoteSectionBodyStart = [Array]::IndexOf($releaseNoteLines, $releaseNoteSectionBodyName)
            $releaseNoteSectionBodyEnd = if ($releaseNoteSectionBodyIndex -lt ($expectedReleaseNoteSections.Count - 1)) {
              [Array]::IndexOf($releaseNoteLines, $expectedReleaseNoteSections[$releaseNoteSectionBodyIndex + 1])
            } else {
              $releaseNoteLines.Count
            }
            if ($releaseNoteSectionBodyStart -lt 0 -or $releaseNoteSectionBodyEnd -le $releaseNoteSectionBodyStart) {
              throw "Release notes section body boundaries were not canonical before publication: $releaseNoteSectionBodyName"
            }
            $releaseNoteSectionBodyLines = @($releaseNoteLines[($releaseNoteSectionBodyStart + 1)..($releaseNoteSectionBodyEnd - 1)] | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
            $expectedReleaseNoteSectionBodyLines = @($expectedReleaseNoteSectionBodies[$releaseNoteSectionBodyName])
            if ($releaseNoteSectionBodyLines.Count -ne $expectedReleaseNoteSectionBodyLines.Count) {
              throw "Release notes section body line count mismatch before publication for $releaseNoteSectionBodyName. Expected $($expectedReleaseNoteSectionBodyLines.Count) but found $($releaseNoteSectionBodyLines.Count)."
            }
            for ($releaseNoteSectionBodyLineIndex = 0; $releaseNoteSectionBodyLineIndex -lt $expectedReleaseNoteSectionBodyLines.Count; $releaseNoteSectionBodyLineIndex++) {
              if ($releaseNoteSectionBodyLines[$releaseNoteSectionBodyLineIndex] -ne $expectedReleaseNoteSectionBodyLines[$releaseNoteSectionBodyLineIndex]) {
                throw "Release notes section body mismatch before publication for $releaseNoteSectionBodyName at line $releaseNoteSectionBodyLineIndex."
              }
            }
          }

          $assetNames = @($assetPaths | ForEach-Object { Split-Path -Leaf $_ } | Sort-Object)
          $expectedAssetNames = @(
            'SHA256SUMS.txt',
            "typesharp-cli-dotnet-$env:RELEASE_TAG.zip",
            "typesharp-runtime-net48-$env:RELEASE_TAG.zip",
            "typesharp-vscode-$env:RELEASE_TAG.vsix"
          ) | Sort-Object
          $assetSetDifference = Compare-Object -ReferenceObject $expectedAssetNames -DifferenceObject $assetNames
          if ($null -ne $assetSetDifference) {
            throw "Local release asset set mismatch before publication. Expected '$($expectedAssetNames -join ', ')' but found '$($assetNames -join ', ')'."
          }

          $checksumPath = Join-Path $releaseRoot 'SHA256SUMS.txt'
          $localChecksumEntries = @(
            Get-Content -LiteralPath $checksumPath |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              ForEach-Object {
                $parts = $_ -split '\s+', 2
                if ($parts.Count -ne 2 -or [string]::IsNullOrWhiteSpace($parts[1])) {
                  throw "Local SHA256SUMS.txt entry is malformed before publication: $_"
                }
                if ($parts[0] -notmatch '^[0-9a-f]{64}$') {
                  throw "Local SHA256SUMS.txt hash for '$($parts[1])' is not lowercase SHA-256 before publication."
                }
                [PSCustomObject]@{
                  Hash = $parts[0]
                  Name = $parts[1]
                }
              }
          )
          $expectedLocalChecksumAssetNames = @(
            "typesharp-cli-dotnet-$env:RELEASE_TAG.zip",
            "typesharp-runtime-net48-$env:RELEASE_TAG.zip",
            "typesharp-vscode-$env:RELEASE_TAG.vsix"
          ) | Sort-Object
          $localChecksumAssetNames = @($localChecksumEntries | ForEach-Object { $_.Name } | Sort-Object)
          $localChecksumSetDifference = Compare-Object -ReferenceObject $expectedLocalChecksumAssetNames -DifferenceObject $localChecksumAssetNames
          if ($null -ne $localChecksumSetDifference) {
            throw "Local checksum manifest asset set mismatch before publication. Expected '$($expectedLocalChecksumAssetNames -join ', ')' but found '$($localChecksumAssetNames -join ', ')'."
          }
          foreach ($expectedLocalChecksumAssetName in $expectedLocalChecksumAssetNames) {
            $matches = @($localChecksumEntries | Where-Object { $_.Name -eq $expectedLocalChecksumAssetName })
            if ($matches.Count -ne 1) {
              throw "Local SHA256SUMS.txt must list $expectedLocalChecksumAssetName exactly once before publication."
            }
            $expectedHash = $matches[0].Hash.ToLowerInvariant()
            $assetPath = Join-Path $releaseRoot $expectedLocalChecksumAssetName
            $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $assetPath).Hash.ToLowerInvariant()
            if ($actualHash -ne $expectedHash) {
              throw "Local release asset checksum mismatch before publication for $expectedLocalChecksumAssetName. Expected $expectedHash but found $actualHash."
            }
          }

          $releaseExists = $false
          try {
            & gh release view $env:RELEASE_TAG *> $null
            $releaseExists = $true
          }
          catch {
            $releaseExists = $false
          }

          if ($releaseExists) {
            $existingRelease = gh release view $env:RELEASE_TAG --json assets | ConvertFrom-Json
            foreach ($existingAssetName in @($existingRelease.assets | ForEach-Object { $_.name })) {
              if ($expectedAssetNames -notcontains $existingAssetName) {
                & gh release delete-asset $env:RELEASE_TAG $existingAssetName --yes
              }
            }
            & gh release upload $env:RELEASE_TAG @assetPaths --clobber
            & gh release edit $env:RELEASE_TAG --title "TypeSharp $env:RELEASE_TAG" --notes-file $notesPath --draft=false "--prerelease=$expectedPrerelease"
          }
          else {
            $createArgs = @(
              'release',
              'create',
              $env:RELEASE_TAG
            ) + $assetPaths + @(
              '--title',
              "TypeSharp $env:RELEASE_TAG",
              '--notes-file',
              $notesPath,
              '--verify-tag'
            )

            if ($expectedPrerelease) {
              $createArgs += '--prerelease'
              $createArgs += '--latest=false'
            }
            else {
              $createArgs += '--latest'
            }

            & gh @createArgs
          }

          $releaseForLatest = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          $expectedMakeLatest = if ($expectedPrerelease) { 'false' } else { 'true' }
          gh api "repos/$env:GITHUB_REPOSITORY/releases/$($releaseForLatest.id)" -X PATCH -f "make_latest=$expectedMakeLatest" | Out-Null

      - name: Smoke published GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          function Assert-Contains([string] $value, [string] $expected, [string] $message) {
            if (-not $value.Contains($expected)) {
              throw $message
            }
          }

          function Assert-NotContains([string] $value, [string] $unexpected, [string] $message) {
            if ($value.Contains($unexpected)) {
              throw $message
            }
          }

          function Verify-ReleaseAssetHash([string] $assetName, [string] $assetPath, [string] $checksumPath) {
            $matches = @(Get-Content -LiteralPath $checksumPath |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              ForEach-Object {
                $parts = $_ -split '\s+', 2
                if ($parts.Count -ne 2 -or [string]::IsNullOrWhiteSpace($parts[1])) {
                  throw "Malformed SHA256SUMS.txt entry: $_"
                }
                if ($parts[0] -notmatch '^[0-9a-f]{64}$') {
                  throw "Malformed SHA256SUMS.txt hash for '$($parts[1])'."
                }

                [PSCustomObject]@{
                  Hash = $parts[0]
                  Name = $parts[1]
                }
              } |
              Where-Object { $_.Name -eq $assetName })
            if ($matches.Count -eq 0) {
              throw "SHA256SUMS.txt does not list $assetName."
            }
            if ($matches.Count -gt 1) {
              throw "SHA256SUMS.txt lists $assetName more than once."
            }

            $expectedHash = $matches[0].Hash.ToLowerInvariant()
            $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $assetPath).Hash.ToLowerInvariant()
            if ($actualHash -ne $expectedHash) {
              throw "Checksum mismatch for $assetName. Expected $expectedHash but found $actualHash."
            }
          }

          function Verify-ReleaseAssetDigest([object] $asset, [string] $assetPath, [string] $assetName) {
            $expectedDigest = [string] $asset.digest
            if ($expectedDigest -notmatch '^sha256:[0-9a-f]{64}$') {
              throw "Hosted release API asset '$assetName' digest was '$expectedDigest' instead of sha256:<64 lowercase hex chars>."
            }

            $expectedHash = $expectedDigest.Substring('sha256:'.Length)
            $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $assetPath).Hash.ToLowerInvariant()
            if ($actualHash -ne $expectedHash) {
              throw "Hosted release API digest mismatch for $assetName. Expected $expectedHash but found $actualHash."
            }
          }

          function Invoke-ReleaseAssetDownload([string] $uri, [string] $assetPath, [string] $assetName, [int64] $expectedSize) {
            $maxAttempts = 6
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              try {
                Invoke-WebRequest $uri -OutFile $assetPath
                if (-not (Test-Path $assetPath)) {
                  throw "Downloaded $assetName but the file was missing."
                }

                $actualSize = [int64] (Get-Item -LiteralPath $assetPath).Length
                if ($actualSize -eq $expectedSize) {
                  return
                }

                throw "Downloaded $assetName but the file size was $actualSize bytes instead of the GitHub Release API size $expectedSize bytes."
              }
              catch {
                if ($attempt -eq $maxAttempts) {
                  throw "Could not download $assetName from $uri after $maxAttempts attempts. $($_.Exception.Message)"
                }

                Start-Sleep -Seconds ([Math]::Min(30, 5 * $attempt))
              }
            }
          }

          function Get-HostedReleaseAsset([object] $releaseMetadata, [string] $assetName, [string] $expectedDownloadUrl) {
            $matches = @($releaseMetadata.assets | Where-Object { $_.name -eq $assetName })
            if ($matches.Count -eq 0) {
              throw "Hosted release API does not list expected asset $assetName."
            }
            if ($matches.Count -gt 1) {
              throw "Hosted release API lists $assetName more than once."
            }

            $asset = $matches[0]
            if ([string] $asset.state -ne 'uploaded') {
              throw "Hosted release API asset '$assetName' state was '$($asset.state)' instead of uploaded."
            }
            if ([int64] $asset.size -le 0) {
              throw "Hosted release API asset '$assetName' size was '$($asset.size)' instead of a nonzero byte count."
            }
            if ([string] $asset.browser_download_url -ne $expectedDownloadUrl) {
              throw "Hosted release API asset '$assetName' browser_download_url was '$($asset.browser_download_url)' instead of '$expectedDownloadUrl'."
            }
            if ([string] $asset.digest -notmatch '^sha256:[0-9a-f]{64}$') {
              throw "Hosted release API asset '$assetName' digest was '$($asset.digest)' instead of sha256:<64 lowercase hex chars>."
            }

            return $asset
          }

          $releaseBase = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG"
          $downloadRoot = Join-Path $env:RUNNER_TEMP "typesharp-hosted-release-smoke"
          $installRoot = Join-Path $downloadRoot "typesharp-cli"
          $workspaceRoot = Join-Path $downloadRoot "workspace"
          $runtimeRoot = Join-Path $workspaceRoot "typesharp-runtime"
          $vsixRoot = Join-Path $downloadRoot "typesharp-vscode"
          Remove-Item -Recurse -Force $downloadRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $downloadRoot, $installRoot, $runtimeRoot, $workspaceRoot, $vsixRoot | Out-Null
          $repositoryRoot = (Resolve-Path $env:GITHUB_WORKSPACE).Path
          $resolvedDownloadRoot = (Resolve-Path $downloadRoot).Path
          if ($resolvedDownloadRoot.StartsWith($repositoryRoot, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw 'Hosted release download and extraction workspace must be outside the repository checkout.'
          }
          $resolvedWorkspaceRoot = (Resolve-Path $workspaceRoot).Path
          if ($resolvedWorkspaceRoot.StartsWith($repositoryRoot, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw 'Hosted release smoke workspace must be outside the repository checkout.'
          }

          $cliAsset = "typesharp-cli-dotnet-$env:RELEASE_TAG.zip"
          $runtimeAsset = "typesharp-runtime-net48-$env:RELEASE_TAG.zip"
          $vsixAsset = "typesharp-vscode-$env:RELEASE_TAG.vsix"
          $checksumAsset = "SHA256SUMS.txt"
          $cliZip = Join-Path $downloadRoot $cliAsset
          $runtimeZip = Join-Path $downloadRoot $runtimeAsset
          $vsixPath = Join-Path $downloadRoot $vsixAsset
          $checksumPath = Join-Path $downloadRoot $checksumAsset

          $expectedPrerelease = $env:RELEASE_TAG -like 'v0.*' -or $env:RELEASE_TAG -like '*-*'
          $expectedChannel = if ($expectedPrerelease) { 'Preview' } else { 'Stable' }
          $releaseDownloadMetadata = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          if ($releaseDownloadMetadata.tag_name -ne $env:RELEASE_TAG) {
            throw "Hosted release API tag '$($releaseDownloadMetadata.tag_name)' did not match '$env:RELEASE_TAG' before asset download."
          }
          $expectedReleaseUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/tag/$env:RELEASE_TAG"
          if ([string] $releaseDownloadMetadata.html_url -ne $expectedReleaseUrl) {
            throw "Hosted release API html_url '$($releaseDownloadMetadata.html_url)' did not match '$expectedReleaseUrl' before asset download."
          }
          if ([string] $releaseDownloadMetadata.name -ne "TypeSharp $env:RELEASE_TAG") {
            throw "Hosted release API title '$($releaseDownloadMetadata.name)' did not match 'TypeSharp $env:RELEASE_TAG' before asset download."
          }
          if ([bool] $releaseDownloadMetadata.draft) {
            throw "Hosted release API reports '$env:RELEASE_TAG' as a draft before asset download."
          }
          if ([bool] $releaseDownloadMetadata.prerelease -ne $expectedPrerelease) {
            throw "Hosted release API prerelease flag '$($releaseDownloadMetadata.prerelease)' did not match expected '$expectedPrerelease' for '$env:RELEASE_TAG' before asset download."
          }
          if ([string]::IsNullOrWhiteSpace([string] $releaseDownloadMetadata.published_at)) {
            throw "Hosted release API does not expose a published_at timestamp for '$env:RELEASE_TAG' before asset download."
          }
          $expectedApiAssetNames = @($checksumAsset, $cliAsset, $runtimeAsset, $vsixAsset) | Sort-Object
          $apiAssetNames = @($releaseDownloadMetadata.assets | ForEach-Object { $_.name } | Sort-Object)
          $apiAssetSetDifference = Compare-Object -ReferenceObject $expectedApiAssetNames -DifferenceObject $apiAssetNames
          if ($null -ne $apiAssetSetDifference) {
            throw "Hosted release API asset set mismatch before download. Expected '$($expectedApiAssetNames -join ', ')' but found '$($apiAssetNames -join ', ')'."
          }

          $cliApiAsset = Get-HostedReleaseAsset $releaseDownloadMetadata $cliAsset "$releaseBase/$cliAsset"
          $runtimeApiAsset = Get-HostedReleaseAsset $releaseDownloadMetadata $runtimeAsset "$releaseBase/$runtimeAsset"
          $vsixApiAsset = Get-HostedReleaseAsset $releaseDownloadMetadata $vsixAsset "$releaseBase/$vsixAsset"
          $checksumApiAsset = Get-HostedReleaseAsset $releaseDownloadMetadata $checksumAsset "$releaseBase/$checksumAsset"

          Invoke-ReleaseAssetDownload $cliApiAsset.browser_download_url $cliZip $cliAsset ([int64] $cliApiAsset.size)
          Invoke-ReleaseAssetDownload $runtimeApiAsset.browser_download_url $runtimeZip $runtimeAsset ([int64] $runtimeApiAsset.size)
          Invoke-ReleaseAssetDownload $vsixApiAsset.browser_download_url $vsixPath $vsixAsset ([int64] $vsixApiAsset.size)
          Invoke-ReleaseAssetDownload $checksumApiAsset.browser_download_url $checksumPath $checksumAsset ([int64] $checksumApiAsset.size)

          Verify-ReleaseAssetDigest $cliApiAsset $cliZip $cliAsset
          Verify-ReleaseAssetDigest $runtimeApiAsset $runtimeZip $runtimeAsset
          Verify-ReleaseAssetDigest $vsixApiAsset $vsixPath $vsixAsset
          Verify-ReleaseAssetDigest $checksumApiAsset $checksumPath $checksumAsset

          $checksumAssetNames = Get-Content -LiteralPath $checksumPath |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            ForEach-Object {
              $parts = $_ -split '\s+', 2
              if ($parts.Count -ne 2 -or [string]::IsNullOrWhiteSpace($parts[1])) {
                throw "Malformed SHA256SUMS.txt entry: $_"
              }
              if ($parts[0] -notmatch '^[0-9a-f]{64}$') {
                throw "Malformed SHA256SUMS.txt hash for '$($parts[1])'."
              }

              $parts[1]
            } |
            Sort-Object
          $duplicateChecksumAssetName = $checksumAssetNames |
            Group-Object |
            Where-Object { $_.Count -gt 1 } |
            Select-Object -First 1
          if ($null -ne $duplicateChecksumAssetName) {
            throw "SHA256SUMS.txt lists '$($duplicateChecksumAssetName.Name)' more than once."
          }

          $expectedChecksumAssetNames = @($cliAsset, $runtimeAsset, $vsixAsset) | Sort-Object
          $checksumSetDifference = Compare-Object -ReferenceObject $expectedChecksumAssetNames -DifferenceObject $checksumAssetNames
          if ($null -ne $checksumSetDifference) {
            throw "Checksum manifest asset set mismatch. Expected '$($expectedChecksumAssetNames -join ', ')' but found '$($checksumAssetNames -join ', ')'."
          }

          Verify-ReleaseAssetHash $cliAsset $cliZip $checksumPath
          Verify-ReleaseAssetHash $runtimeAsset $runtimeZip $checksumPath
          Verify-ReleaseAssetHash $vsixAsset $vsixPath $checksumPath

          $vsixZipPath = Join-Path $downloadRoot "$vsixAsset.zip"
          Copy-Item -LiteralPath $vsixPath -Destination $vsixZipPath -Force
          Expand-Archive $vsixZipPath -DestinationPath $vsixRoot -Force
          $expectedVsixEntries = @(
            'extension\package.json',
            'extension\extension.js',
            'extension\language-configuration.json',
            'extension\README.md',
            'extension\MARKETPLACE.md',
            'extension\syntaxes\typesharp.tmLanguage.json',
            'extension\server\TypeSharp.LanguageServer.dll'
          )
          foreach ($expectedVsixEntry in $expectedVsixEntries) {
            if (-not (Test-Path (Join-Path $vsixRoot $expectedVsixEntry))) {
              throw "Hosted VSIX archive does not contain $expectedVsixEntry."
            }
          }
          $vsixPackage = Get-Content -Raw -LiteralPath (Join-Path $vsixRoot 'extension\package.json') | ConvertFrom-Json
          if ($vsixPackage.name -ne 'typesharp-vscode') {
            throw "Hosted VSIX package name '$($vsixPackage.name)' did not match typesharp-vscode."
          }
          if ($vsixPackage.displayName -ne 'TypeSharp') {
            throw "Hosted VSIX display name '$($vsixPackage.displayName)' did not match TypeSharp."
          }
          if ($vsixPackage.description -ne 'Language support for TypeSharp .tysh source files.') {
            throw "Hosted VSIX description '$($vsixPackage.description)' did not match the expected release description."
          }
          if ($vsixPackage.version -ne '0.1.0') {
            throw "Hosted VSIX package version '$($vsixPackage.version)' did not match 0.1.0."
          }
          if ($vsixPackage.publisher -ne 'typesharp') {
            throw "Hosted VSIX publisher '$($vsixPackage.publisher)' did not match typesharp."
          }
          if ($vsixPackage.main -ne './extension.js') {
            throw "Hosted VSIX main '$($vsixPackage.main)' did not match ./extension.js."
          }
          if (-not @($vsixPackage.categories).Contains('Programming Languages')) {
            throw 'Hosted VSIX package does not list the Programming Languages category.'
          }
          if (-not @($vsixPackage.activationEvents).Contains('onLanguage:typesharp')) {
            throw 'Hosted VSIX package does not activate on the TypeSharp language.'
          }
          $vsixLanguage = @($vsixPackage.contributes.languages | Where-Object { $_.id -eq 'typesharp' }) | Select-Object -First 1
          if ($null -eq $vsixLanguage -or -not @($vsixLanguage.extensions).Contains('.tysh')) {
            throw 'Hosted VSIX package does not contribute the TypeSharp .tysh language.'
          }
          $vsixGrammar = @($vsixPackage.contributes.grammars | Where-Object { $_.language -eq 'typesharp' }) | Select-Object -First 1
          if ($null -eq $vsixGrammar -or $vsixGrammar.scopeName -ne 'source.typesharp' -or $vsixGrammar.path -ne './syntaxes/typesharp.tmLanguage.json') {
            throw 'Hosted VSIX package does not contribute the expected TypeSharp grammar.'
          }

          Expand-Archive $cliZip -DestinationPath $installRoot -Force
          Expand-Archive $runtimeZip -DestinationPath $runtimeRoot -Force
          if (-not (Test-Path (Join-Path $installRoot 'typesharp.dll'))) {
            throw 'Hosted CLI archive does not contain typesharp.dll.'
          }
          if (-not (Test-Path (Join-Path $installRoot 'typesharp.cmd'))) {
            throw 'Hosted CLI archive does not contain typesharp.cmd.'
          }
          if (-not (Test-Path (Join-Path $installRoot 'TypeSharp.Compiler.dll'))) {
            throw 'Hosted CLI archive does not contain TypeSharp.Compiler.dll.'
          }
          if (-not (Test-Path (Join-Path $installRoot 'TypeSharp.LanguageServer.dll'))) {
            throw 'Hosted CLI archive does not contain TypeSharp.LanguageServer.dll.'
          }
          $cliReadmePath = Join-Path $installRoot 'README.md'
          if (-not (Test-Path $cliReadmePath)) {
            throw 'Hosted CLI archive does not contain README.md.'
          }
          $hostedWrapperPath = Join-Path $installRoot 'typesharp.cmd'
          $hostedWrapper = Get-Content -Raw -LiteralPath $hostedWrapperPath
          Assert-Contains $hostedWrapper '@echo off' 'Hosted CLI wrapper does not disable command echo.'
          Assert-Contains $hostedWrapper 'setlocal' 'Hosted CLI wrapper does not isolate environment changes.'
          Assert-Contains $hostedWrapper 'set "TYPESHARP_HOME=%~dp0"' 'Hosted CLI wrapper does not set TYPESHARP_HOME to the extracted directory.'
          Assert-Contains $hostedWrapper 'dotnet "%TYPESHARP_HOME%typesharp.dll" %*' 'Hosted CLI wrapper does not launch typesharp.dll through dotnet.'
          if (-not (Test-Path (Join-Path $runtimeRoot 'lib\net48\TypeSharp.Core.dll'))) {
            throw 'Hosted runtime archive does not contain lib/net48/TypeSharp.Core.dll.'
          }
          if (-not (Test-Path (Join-Path $runtimeRoot 'lib\net48\TypeSharp.Runtime.dll'))) {
            throw 'Hosted runtime archive does not contain lib/net48/TypeSharp.Runtime.dll.'
          }
          $runtimeReadmePath = Join-Path $runtimeRoot 'README.md'
          if (-not (Test-Path $runtimeReadmePath)) {
            throw 'Hosted runtime archive does not contain README.md.'
          }
          $env:PATH = "$installRoot;$env:PATH"
          $resolvedTypeSharpCommand = (Get-Command typesharp -CommandType Application).Source
          $expectedTypeSharpCommand = Join-Path $installRoot 'typesharp.cmd'
          if ($resolvedTypeSharpCommand -ne $expectedTypeSharpCommand) {
            throw "Hosted PATH smoke resolved typesharp to '$resolvedTypeSharpCommand' instead of '$expectedTypeSharpCommand'."
          }
          $originalPath = $env:PATH
          $previousNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          try {
            $env:PATH = $installRoot
            $missingHostOutput = & $expectedTypeSharpCommand version 2>&1
            $missingHostExitCode = $LASTEXITCODE
          }
          finally {
            $env:PATH = $originalPath
            $PSNativeCommandUseErrorActionPreference = $previousNativeCommandPreference
          }
          if ($missingHostExitCode -eq 0) {
            throw 'Hosted CLI host-prerequisite smoke unexpectedly succeeded without dotnet on PATH.'
          }
          Assert-Contains ($missingHostOutput -join "`n") 'dotnet' 'Hosted CLI host-prerequisite smoke did not report the missing dotnet host.'
          $global:LASTEXITCODE = 0

          $release = gh release view $env:RELEASE_TAG --json assets,body,tagName,name,isDraft,isPrerelease,publishedAt,url | ConvertFrom-Json
          if ($release.tagName -ne $env:RELEASE_TAG) {
            throw "Release page tag '$($release.tagName)' did not match '$env:RELEASE_TAG'."
          }
          $expectedReleaseUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/tag/$env:RELEASE_TAG"
          if ($release.url -ne $expectedReleaseUrl) {
            throw "Release page URL '$($release.url)' did not match '$expectedReleaseUrl'."
          }
          if ($release.name -ne "TypeSharp $env:RELEASE_TAG") {
            throw "Release page title '$($release.name)' did not match 'TypeSharp $env:RELEASE_TAG'."
          }
          if ($release.isDraft) {
            throw "Release page '$env:RELEASE_TAG' is still a draft and is not publicly installable."
          }
          if ([string]::IsNullOrWhiteSpace([string] $release.publishedAt)) {
            throw "Release page '$env:RELEASE_TAG' does not have a publishedAt timestamp."
          }
          $expectedReleaseBodyTitlePattern = '(?m)^# TypeSharp ' + [regex]::Escape($env:RELEASE_TAG) + '\r?$'
          if ($release.body -notmatch $expectedReleaseBodyTitlePattern) {
            throw "Release page body does not include the expected release-note title line for $env:RELEASE_TAG."
          }
          $releaseBodyTopLevelHeadings = @($release.body -split '\r?\n' | Where-Object { $_.StartsWith('# ', [StringComparison]::Ordinal) })
          if ($releaseBodyTopLevelHeadings.Count -ne 1 -or $releaseBodyTopLevelHeadings[0] -ne "# TypeSharp $env:RELEASE_TAG") {
            throw "Release page body must contain exactly one top-level release-note title: # TypeSharp $env:RELEASE_TAG"
          }
          $releaseDateLine = $release.body -split "`n" | Where-Object { $_.StartsWith('Date:') } | Select-Object -First 1
          if ($null -eq $releaseDateLine) {
            throw 'Release page does not include the release date.'
          }
          $releaseDate = $releaseDateLine.Substring('Date:'.Length).Trim()
          if ($releaseDate -notmatch '^\d{4}-\d{2}-\d{2}$') {
            throw "Release page date '$releaseDate' must use yyyy-MM-dd."
          }

          $releaseAssetNames = @($release.assets | ForEach-Object { $_.name } | Sort-Object)
          $expectedAssetNames = @($checksumAsset, $cliAsset, $runtimeAsset, $vsixAsset) | Sort-Object
          $assetSetDifference = Compare-Object -ReferenceObject $expectedAssetNames -DifferenceObject $releaseAssetNames
          if ($null -ne $assetSetDifference) {
            throw "Release asset set mismatch. Expected '$($expectedAssetNames -join ', ')' but found '$($releaseAssetNames -join ', ')'."
          }

          if ($release.isPrerelease -ne $expectedPrerelease) {
            throw "Release prerelease flag '$($release.isPrerelease)' did not match expected '$expectedPrerelease' for '$env:RELEASE_TAG'."
          }
          $latestRelease = $null
          try {
            $latestRelease = gh api "repos/$env:GITHUB_REPOSITORY/releases/latest" | ConvertFrom-Json
          }
          catch {
            $latestRelease = $null
          }
          if ($expectedPrerelease -and $null -ne $latestRelease -and $latestRelease.tag_name -eq $env:RELEASE_TAG) {
            throw "Preview release '$env:RELEASE_TAG' was marked as the repository latest release."
          }
          if (-not $expectedPrerelease -and ($null -eq $latestRelease -or $latestRelease.tag_name -ne $env:RELEASE_TAG)) {
            $actualLatestTag = if ($null -eq $latestRelease) { '<none>' } else { [string] $latestRelease.tag_name }
            throw "Stable release '$env:RELEASE_TAG' was not marked as the repository latest release. Latest was '$actualLatestTag'."
          }

